<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#10141F;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
input,textarea,button,select{font-family:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 14px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:#FFB02E;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}

.header-right{display:flex;align-items:center;gap:8px}
.status-dot{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.btn-sair{background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:6px 12px;color:#7C8AAE;cursor:pointer;font-size:12px}
.main{padding:0 20px 40px;flex:1}
.card{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{width:100%;border-radius:12px;padding:14px;font-weight:700;font-size:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#FFB02E;color:#1C2333}
.btn-secondary{background:#3D5A80;color:#fff}
.btn-ghost{background:transparent;color:#7C8AAE;border:1px solid #2C3550}
.btn-sm{width:auto;padding:6px 14px;font-size:13px;border-radius:8px}
.tabs{display:flex;background:#1C2333;border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all .2s}
.tab.active-amber{background:#FFB02E;color:#1C2333}
.tab.active-blue{background:#3D5A80;color:#fff}
.tab.inactive{background:transparent;color:#7C8AAE}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7C8AAE;display:block;margin-bottom:6px}
.field-input{width:100%;background:transparent;border:none;border-bottom:2px solid #3D5A80;padding-bottom:6px;color:#fff;font-size:16px;outline:none;margin-bottom:16px}
.field-input::placeholder{color:#3D5A80}
.field-textarea{width:100%;background:transparent;border:2px solid #2C3550;border-radius:8px;padding:10px;color:#fff;font-size:13px;outline:none;resize:none;margin-bottom:16px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.tipo-btn{background:#1C2333;border:1px solid #2C3550;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;font-weight:600;text-align:left;color:#C8D2EC;transition:all .2s}
.tipo-btn.active{background:#FFB02E;color:#1C2333;border-color:#FFB02E}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.foto-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:4px;right:4px;background:#C0392B;border:none;border-radius:50%;width:22px;height:22px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.foto-num{position:absolute;bottom:0;left:0;right:0;background:#00000088;color:#fff;text-align:center;font-size:10px;padding:2px}
.foto-add{background:#1C2333;border:1px dashed #3D5A80;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;aspect-ratio:1;font-size:22px}
.foto-add span{font-size:10px;color:#5C6889;margin-top:4px}
.foto-btn-vazio{display:flex;align-items:center;justify-content:center;gap:8px;background:#1C2333;border:1px dashed #3D5A80;border-radius:10px;padding:12px;cursor:pointer;color:#9DB0D6;font-size:13px;margin-bottom:16px;width:100%}
.bo-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#2A1F12;border:1px dashed #D9A441;border-radius:10px;padding:12px;cursor:pointer;color:#E8C77A;font-size:13px;margin-bottom:16px;width:100%}
.erro{background:#C0392B22;border:1px solid #C0392B55;color:#FF9B8A;border-radius:8px;padding:10px 14px;font-size:13px;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.success{background:#2E7D3222;border:1px solid #2E7D3255;color:#81C784;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.kpi{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:14px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7C8AAE;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#fff}
.filtros{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.filtro-btn{flex-shrink:0;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #2C3550;background:transparent;color:#7C8AAE;transition:all .2s}
.filtro-btn.active{background:#FFB02E;color:#1C2333;border-color:#FFB02E}
.sol-item{background:#1C2333;border:1px solid #2C3550;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;width:100%;text-align:left}
.sol-title{color:#fff;font-weight:600;font-size:14px}
.sol-sub{color:#7C8AAE;font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.hist-item{display:flex;align-items:flex-start;gap:12px;position:relative;padding-bottom:14px}

.hist-line{position:absolute;left:6px;top:16px;width:2px;height:100%;background:#2C3550}

.hist-date{color:#7C8AAE;font-size:11px}
.status-btns{display:flex;flex-wrap:wrap;gap:8px}
.status-btn{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.data-item label{color:#7C8AAE;font-size:11px;display:block}
.data-item p{color:#fff;font-size:12px;font-family:monospace;margin-top:2px}
.placa-sub-box{background:#FFB02E11;border:1px solid #FFB02E44;border-radius:8px;padding:10px;grid-column:1/-1;margin-top:4px}
.volta-btn{background:none;border:none;color:#7C8AAE;cursor:pointer;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.email-item{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.email-nome{color:#fff;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-addr{color:#7C8AAE;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-status{font-size:10px;margin-top:2px}
.toggle-btn{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid}
.del-btn{width:32px;height:32px;border-radius:8px;background:#C0392B22;border:none;color:#C0392B;cursor:pointer;font-size:16px;flex-shrink:0}
.pdf-container{display:flex;flex-direction:column;gap:12px}
.pdf-header{display:flex;justify-content:space-between;align-items:center}
iframe{width:100%;height:70vh;border-radius:12px;border:1px solid #2C3550}
.hidden{display:none!important}
.sig-canvas{border:2px solid #3D5A80;border-radius:8px;background:#fff;touch-action:none;cursor:crosshair;width:100%;height:120px}
.sig-box{margin-bottom:12px}
.urgencia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.urgencia-btn{border-radius:10px;padding:10px 8px;cursor:pointer;font-size:13px;font-weight:700;text-align:center;border:2px solid transparent;transition:all .2s}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#C0392B;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.status-changed{animation:pulse-green 1s ease-in-out}
@keyframes pulse-green{0%,100%{background:#1C2333}50%{background:#2E7D3222}}
.km-field{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.km-input{flex:1;background:transparent;border:none;border-bottom:2px solid #3D5A80;padding-bottom:6px;color:#fff;font-size:16px;outline:none}
.km-suffix{color:#7C8AAE;font-size:13px;white-space:nowrap}
.urgencia-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700}
.cancel-btn{background:#C0392B22;border:1px solid #C0392B55;color:#FF9B8A;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;width:100%;margin-top:8px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite}

.success-icon{width:64px;height:64px;background:#2E7D3222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.text-center{text-align:center}
.mb-4{margin-bottom:16px}
.mt-2{margin-top:8px}
.choice-card{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;width:100%;text-align:left;margin-bottom:12px;transition:border-color .2s}
.choice-card:hover{border-color:#FFB02E}
.choice-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.choice-title{color:#fff;font-weight:700;font-size:14px}
.choice-sub{color:#7C8AAE;font-size:12px;margin-top:2px}
</style>

<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-box">🚛</div>
      <div class="logo-text">
        <h1>Frota Conecta</h1>

    </div>
    <div class="header-right">
      <div class="status-dot" id="status-dot">

      📲 Instalar app na tela inicial
    </button>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const BACKEND = "https://frota-conecta-backend.onrender.com";
const API_KEY = "FC2024@frotaConecta#segura";
const TIPOS = [
  {id:"revisao",l:"Revisão"},{id:"pneu",l:"Troca de pneu"},
  {id:"parabrisa",l:"Troca de parabrisa"},{id:"oleo",l:"Troca de óleo"},
  {id:"sinistro",l:"⚠ Sinistro / Acidente"},{id:"outro",l:"Outro"}
];
const URGENCIA = [
  {id:"normal",l:"Normal",c:"#3D5A80",icon:"🟢"},
  {id:"urgente",l:"Urgente",c:"#D9A441",icon:"🟡"},
  {id:"critico",l:"Crítico",c:"#C0392B",icon:"🔴"}
];
const STATUS = {
  pendente:{l:"Pendente envio",c:"#C0392B"},
  enviado:{l:"Enviado — aguardando",c:"#D9A441"},
  andamento:{l:"Em andamento",c:"#3D5A80"},
  concluido:{l:"Concluído",c:"#2E7D32"},
  cancelado:{l:"Cancelado",c:"#5C6889"}
};

let session = null, users = [], records = [], emails = [], fotos = [], boFile = null;
let pingInterval = null;

// API
async function api(method, path, body){
  const res = await fetch(BACKEND+path, {
    method, headers:{"Content-Type":"application/json","x-api-key":API_KEY},
    body: body ? JSON.stringify(body) : undefined,
    signal: AbortSignal.timeout(60000)
  });
  if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error||`Erro ${res.status}`); }
  return res.json();
}

// Storage com fallback localStorage
async function loadUsers(){ try{ return await api("GET","/api/usuarios"); }catch{ return JSON.parse(localStorage.getItem("fc_users")||"[]"); } }
async function saveUser(u){ 
  // Nunca salva localmente como fallback — garante que só conta como cadastrado
  // quando realmente persistido no banco de dados (MongoDB).
  return await api("POST","/api/usuarios",u);
}
async function loginApi(body){ return api("POST","/api/usuarios/login",body); }
// ===== ATENDIMENTOS =====
// ===== SAÍDAS DE ATENDIMENTO =====
async function loadSaidas(){
  return await api("GET","/api/saidas");
}
async function saveSaida(s){
  return await api("POST","/api/saidas",s);
}
async function updateSaida(id, patch){
  return await api("PATCH",`/api/saidas/${id}`,patch);
}

async function loadAtendimentos(){
  return await api("GET","/api/atendimentos");
}
async function saveAtendimento(a){
  return await api("POST","/api/atendimentos",a);
}
async function updateAtendimento(id, patch){
  return await api("PATCH",`/api/atendimentos/${id}`,patch);
}

async function loadEmails(){ try{ return await api("GET","/api/emails"); }catch{ return JSON.parse(localStorage.getItem("fc_emails")||"[]"); } }
async function saveEmails(l){ return await api("POST","/api/emails",l); }
async function loadRecords(){ try{ return await api("GET","/api/solicitacoes"); }catch{ return JSON.parse(localStorage.getItem("fc_records")||"[]"); } }
async function saveRecord(r){ const l=JSON.parse(localStorage.getItem("fc_records")||"[]"); localStorage.setItem("fc_records",JSON.stringify([...l.filter(x=>x.id!==r.id),r])); }

// Utils
function gerarCodigoValidacao(){
  return Array.from(crypto.getRandomValues(new Uint8Array(4))).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

async function verificarPinUsuario(pin){
  if(!session) return false;
  try{
    const pinHash = await hashPin(pin);
    if(session.role==='gestor'){
      await api("POST","/api/usuarios/login",{role:"gestor",usuario:session.usuario,pinHash});
    } else {
      await api("POST","/api/usuarios/login",{role:session.role,nome:session.nome,pinHash});
    }
    return true;
  }catch{ return false; }
}

async function verificarPinMotorista(nomeMotorista, pin){
  try{
    const pinHash = await hashPin(pin);
    const user = await api("POST","/api/usuarios/login",{role:"motorista",nome:nomeMotorista,pinHash});
    return !!user;
  }catch{ return false; }
}

function renderValidacaoPin(idPrefix){
  return `
    <div class="card" style="margin-bottom:12px;background:#3D5A8011;border-color:#3D5A8055">
      <p class="field-label" style="color:#9DB0D6;margin-bottom:8px">🔐 Confirmação de Identidade</p>
      <p style="color:#7C8AAE;font-size:12px;margin-bottom:10px">Digite seu PIN para validar e assinar digitalmente este documento.</p>
      <input class="field-input" id="${idPrefix}-pin" type="password" inputmode="numeric" maxlength="4" placeholder="•••• Seu PIN"/>
      <div id="${idPrefix}-pin-erro"></div>
    </div>`;
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmt(ts){ if(!ts) return "—"; const d=new Date(ts); return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }
function dur(ms){ if(ms==null||ms<0) return "—"; const m=Math.floor(ms/60000); if(m<60) return m+" min"; const h=Math.floor(m/60); if(h<24) return h+"h "+m%60+"min"; return Math.floor(h/24)+"d "+h%24+"h"; }
async function hashPin(p){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("fc_salt_"+p)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join(""); }
function badge(status){ const s=STATUS[status]||{l:status,c:"#888"}; return `<span class="badge" style="background:${s.c}22;color:${s.c};border:1px solid ${s.c}55"><span class="dot" style="background:${s.c}"></span>${s.l}</span>`; }
function render(html){ document.getElementById("main").innerHTML = html; }
function $(id){ return document.getElementById(id); }

// Ping
async function ping(){
  try{
    await fetch(BACKEND+"/",{method:"GET",mode:"no-cors"});
    setStatus("online");
  }catch{ setStatus("offline"); }
}
function setStatus(s){
  const colors={checking:"#D9A441",online:"#2E7D32",offline:"#C0392B"};
  const labels={checking:"Conectando...",online:"Servidor online",offline:"Servidor offline"};
  const c=colors[s], l=labels[s];
  $("status-dot").style.background=c+"22";
  $("status-dot").style.border=`1px solid ${c}55`;
  $("status-dot-color").style.background=c;
  $("status-label").style.color=c;
  $("status-label").textContent=l;
}

// Compressor de imagem
function compressImage(file){ return new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const s=Math.min(1,700/img.width);
      const c=document.createElement("canvas");
      c.width=img.width*s; c.height=img.height*s;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",.6));
    };
    img.onerror=rej; img.src=e.target.result;
  };
  r.onerror=rej; r.readAsDataURL(file);
});}
function fileToDataUrl(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); }); }

        </button>
      </div>
    </div>`);
}

function showLoginMotorista(tab="entrar"){
  render(`
    <button class="volta-btn" onclick="showLogin()">← Voltar</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div class="choice-icon" style="background:#FFB02E22;width:40px;height:40px;border-radius:10px;font-size:20px">🚗</div>
      <div><div style="font-weight:700;font-size:15px">Área do motorista</div><div style="color:#7C8AAE;font-size:12px">Nome + PIN de 4 dígitos</div></div>
    </div>
    <div class="tabs">
      <button class="tab ${tab==='entrar'?'active-amber':'inactive'}" onclick="showLoginMotorista('entrar')">Entrar</button>
      <button class="tab ${tab==='cadastrar'?'active-amber':'inactive'}" onclick="showLoginMotorista('cadastrar')">Primeiro acesso</button>
    </div>
    <div class="card">
      <label class="field-label">Nome completo *</label>
      <input class="field-input" id="m-nome" placeholder="Seu nome completo" autocomplete="off"/>
      <label class="field-label">PIN (4 dígitos) *</label>

  try{
    const hash=await hashPin(pin);

let tipoSel = null, urgenciaSel = 'normal', kmAtual = '';
function selectTipo(id){
  tipoSel=id;
  document.querySelectorAll(".tipo-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  $("bo-section").classList.toggle("hidden",id!=="sinistro");
}
function selectUrgencia(id){
  urgenciaSel=id;
  document.querySelectorAll(".urgencia-btn").forEach(b=>{
    const u=URGENCIA.find(x=>x.id===b.dataset.id);
    b.style.background=b.dataset.id===id?u.c+"33":"transparent";
    b.style.borderColor=b.dataset.id===id?u.c:"#2C3550";
    b.style.color=b.dataset.id===id?u.c:"#7C8AAE";
  });
}

async function addFotos(input){
  const files=Array.from(input.files||[]);
  const vagas=10-fotos.length;
  const sel=files.slice(0,vagas);
  if(files.length>vagas) setErro("f-erro",`Só foi possível adicionar ${vagas} foto(s). Limite de 10.`);
  for(const f of sel){ try{ fotos.push(await compressImage(f)); }catch{} }
  input.value="";
  renderFotoGrid();
}

function renderFotoGrid(){
  $("foto-count").textContent=fotos.length+"/10";
  $("foto-count").style.color=fotos.length>=10?"#C0392B":"#7C8AAE";
  if(fotos.length===0){ $("foto-grid-container").innerHTML=""; $("foto-btn-label").classList.remove("hidden"); return; }
  $("foto-btn-label").classList.add("hidden");
  $("foto-grid-container").innerHTML=`
    <div class="foto-grid">
      ${fotos.map((src,i)=>`
        <div class="foto-item">
          <img src="${src}" alt="foto ${i+1}"/>
          <button class="foto-del" onclick="removeFoto(${i})">×</button>
          <div class="foto-num">${i+1}</div>
        </div>`).join("")}
      ${fotos.length<10?`<label class="foto-add" for="foto-input"><span>📷</span><span>Adicionar</span></label>`:''}
    </div>`;
  $("foto-btn-label").classList.add("hidden");
}

function removeFoto(i){ fotos.splice(i,1); renderFotoGrid(); if(fotos.length<10) $("foto-btn-label").classList.remove("hidden"); }

async function addBo(input){
  const f=input.files?.[0]; if(!f) return;
  boFile={name:f.name,dataUrl:await fileToDataUrl(f)};
  $("bo-label").textContent="📄 "+f.name;
}

async function enviarSolicitacao(){
  const placa=$("f-placa")?.value?.trim().toUpperCase();
  const desc=$("f-desc")?.value?.trim();
  if(!placa){setErro("f-erro","Informe a placa.");return;}
  if(!tipoSel){setErro("f-erro","Selecione o tipo de situação.");return;}
  if(tipoSel==="sinistro"&&!boFile){setErro("f-erro","Anexe o Boletim de Ocorrência.");return;}
  $("f-btn").disabled=true; $("f-btn").innerHTML='<span class="spinner"></span> Enviando...';
  setErro("f-erro","");
  try{
    const emailsCad=await loadEmails();
    const destinatarios=emailsCad.filter(e=>e.ativo).map(e=>e.email);
    const rec=await api("POST","/api/solicitacoes",{
      motorista:session.nome, placa, tipo:tipoSel, descricao:desc,
      urgencia:urgenciaSel, km:kmAtual,
      fotos, bo:boFile, destinatarios
    });
    localStorage.setItem("fc_records",JSON.stringify([rec,...JSON.parse(localStorage.getItem("fc_records")||"[]")]));
    showSucesso(rec,destinatarios);
  }catch(e){
    setErro("f-erro","Falha ao enviar: "+e.message);
    $("f-btn").disabled=false; $("f-btn").innerHTML='✉ Enviar solicitação';
  }
}

async function cancelarSolicitacao(id){
  if(!confirm("Tem certeza que deseja cancelar esta solicitação?")) return;
  try{
    await api("PATCH",`/api/solicitacoes/${id}`,{status:"cancelado"});
    await showMotorista();
  }catch(e){ alert("Erro ao cancelar: "+e.message); }
}

function filtrarPorPlaca(placa){
  const lista = document.getElementById('lista-solicitacoes');
  if(!lista) return;
  const items = lista.querySelectorAll('.sol-motorista-item');
  items.forEach(item => {
    const itemPlaca = item.dataset.placa||'';
    item.style.display = (!placa || itemPlaca.includes(placa.toUpperCase())) ? '' : 'none';
  });
}

function renderListaAtendimentos(ats, sds, busca='', data=''){
  let lista = [...ats].sort((a,b)=>new Date(b.dataEntrega)-new Date(a.dataEntrega));
  if(busca) lista = lista.filter(a=>
    a.motorista?.toLowerCase().includes(busca.toLowerCase()) ||
    a.veiculo?.toLowerCase().includes(busca.toLowerCase())
  );
  if(data) lista = lista.filter(a=>a.dataEntrega?.slice(0,10)===data);
  if(!lista.length) return '<p style="color:#5C6889;font-size:13px">Nenhum registro encontrado.</p>';
  return lista.map(a=>{
    const kmRodado=a.kmFinal&&a.kmInicial?(parseFloat(a.kmFinal)-parseFloat(a.kmInicial)):null;
    const duracao=a.dataDevolucao?dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)):null;
    const nSaidas=sds.filter(s=>s.atendimentoId===a.id).length;
    const saidaAtiva=sds.find(s=>s.atendimentoId===a.id&&!s.retorno);
    return `<div class="card" style="cursor:pointer;margin-bottom:8px;border-left:3px solid ${a.dataDevolucao?'#2E7D32':saidaAtiva?'#C0392B':'#D9A441'}" onclick="showDetalheAtendimento('${a.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="min-width:0;flex:1">
          <div style="font-weight:700;font-size:14px">👤 ${a.motorista}</div>
          <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🚗 ${a.veiculo} · ${new Date(a.dataEntrega).toLocaleDateString('pt-BR')} · ${nSaidas} saída(s)</div>
          ${saidaAtiva?`<div style="color:#FF9B8A;font-size:11px;font-weight:700;margin-top:2px">📍 Em atendimento: ${saidaAtiva.local}</div>`:''}
          ${kmRodado!==null?`<div style="color:#FFB02E;font-size:11px;font-weight:700;margin-top:2px">📏 ${Number(kmRodado).toLocaleString('pt-BR')} km · ⏱ ${duracao}</div>`:''}
          ${sds.filter(s=>s.atendimentoId===a.id).length>0?`
          <div style="margin-top:6px;padding-top:6px;border-top:1px solid #2C3550">
            ${sds.filter(s=>s.atendimentoId===a.id).map(s=>`
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${s.retorno?'#2E7D32':'#C0392B'}"></span>
                <span style="color:#C8D2EC;font-size:11px">📍 ${s.local}</span>
                <span style="color:#5C6889;font-size:10px;margin-left:auto">${s.retorno?dur(new Date(s.retorno)-new Date(s.saida)):'Em atendimento'}</span>
              </div>`).join('')}
          </div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="badge" style="background:${a.dataDevolucao?'#2E7D3222':saidaAtiva?'#C0392B22':'#D9A44122'};color:${a.dataDevolucao?'#81C784':saidaAtiva?'#FF9B8A':'#FFB02E'};border:1px solid ${a.dataDevolucao?'#2E7D3255':saidaAtiva?'#C0392B55':'#D9A44155'}">
            ${a.dataDevolucao?'✅ Devolvido':saidaAtiva?'📍 Em atendimento':'🔑 Disponível'}
          </span>
          ${a.dataDevolucao?`<button onclick="event.stopPropagation();gerarPDFAtendimento('${a.id}')" style="padding:3px 8px;border-radius:6px;border:1px solid #FFB02E;background:#FFB02E22;color:#FFB02E;cursor:pointer;font-size:10px;font-weight:700">📄 PDF</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function selecionarTipoRelatorio(tipo){
  window._rpTipo = tipo;
  $("rp-tipo-motorista").style.background = tipo==='motorista'?'#FFB02E22':'transparent';
  $("rp-tipo-motorista").style.borderColor = tipo==='motorista'?'#FFB02E':'#2C3550';
  $("rp-tipo-motorista").style.color = tipo==='motorista'?'#FFB02E':'#7C8AAE';
  $("rp-tipo-veiculo").style.background = tipo==='veiculo'?'#FFB02E22':'transparent';
  $("rp-tipo-veiculo").style.borderColor = tipo==='veiculo'?'#FFB02E':'#2C3550';
  $("rp-tipo-veiculo").style.color = tipo==='veiculo'?'#FFB02E':'#7C8AAE';

  const opts = tipo==='motorista' ? window._rpMotoristas : window._rpVeiculos;
  $("rp-select-container").innerHTML = `
    <label class="field-label">${tipo==='motorista'?'Motorista':'Veículo'} *</label>
    <select id="rp-valor" class="field-select" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:10px;color:#fff;font-size:14px;outline:none">
      <option value="">Selecione...</option>
      ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
    </select>`;
}

function gerarRelatorioPDF(){
  const tipo = window._rpTipo;
  const valor = $("rp-valor")?.value;
  const dataIni = $("rp-data-ini")?.value;
  const dataFim = $("rp-data-fim")?.value;

  if(!valor){ setErro("rp-erro", `Selecione um ${tipo==='motorista'?'motorista':'veículo'}.`); return; }
  if(!dataIni||!dataFim){ setErro("rp-erro","Selecione o período."); return; }

  const inicio = new Date(dataIni).getTime();
  const fim = new Date(dataFim).getTime()+86399999;

  let atsFiltrados = atendimentos.filter(a=>{
    const dt = new Date(a.dataEntrega).getTime();
    const matchValor = tipo==='motorista' ? a.motorista===valor : a.veiculo===valor;
    return matchValor && dt>=inicio && dt<=fim;
  });

  if(!atsFiltrados.length){ setErro("rp-erro","Nenhum registro encontrado para esse período."); return; }

  // Montar linhas combinando atendimento + suas saídas
  let totalKm = 0, totalSaidas = 0;
  const blocos = atsFiltrados.map(a=>{
    const saidasAt = saidas.filter(s=>s.atendimentoId===a.id);
    totalSaidas += saidasAt.length;
    const kmRodado = a.kmFinal&&a.kmInicial?(parseFloat(a.kmFinal)-parseFloat(a.kmInicial)):0;
    totalKm += kmRodado;
    const duracao = a.dataDevolucao?dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)):'Em uso';
    const saidasRows = saidasAt.map((s,i)=>`
      <tr style="background:${i%2?'#f5f7ff':'#fff'}">
        <td>${s.local}</td><td>${s.solicitante}</td><td>${s.motivo||'—'}</td>
        <td>${new Date(s.saida).toLocaleString('pt-BR')}</td>
        <td>${s.retorno?new Date(s.retorno).toLocaleString('pt-BR'):'Em atendimento'}</td>
        <td>${s.retorno?dur(new Date(s.retorno)-new Date(s.saida)):'—'}</td>
      </tr>`).join('');
    return `
    <div style="margin-bottom:18px;border:1px solid #e0e4f0;border-radius:8px;padding:12px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:2px solid #FFB02E;padding-bottom:6px">
        <div><strong style="font-size:13px">${tipo==='motorista'?a.veiculo:a.motorista}</strong> <span style="color:#7C8AAE;font-size:11px">— ${tipo==='motorista'?'Veículo':'Motorista'}</span></div>
        <span style="font-size:10px;font-weight:700;color:${a.dataDevolucao?'#2E7D32':'#854F0B'}">${a.dataDevolucao?'✅ Devolvido':'🔑 Em uso'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;font-size:10px">
        <div><span style="color:#7C8AAE">Entrega:</span> ${new Date(a.dataEntrega).toLocaleString('pt-BR')}</div>
        <div><span style="color:#7C8AAE">KM Inicial:</span> ${a.kmInicial?Number(a.kmInicial).toLocaleString('pt-BR'):'—'}</div>
        <div><span style="color:#7C8AAE">Devolução:</span> ${a.dataDevolucao?new Date(a.dataDevolucao).toLocaleString('pt-BR'):'—'}</div>
        <div><span style="color:#7C8AAE">KM Final:</span> ${a.kmFinal?Number(a.kmFinal).toLocaleString('pt-BR'):'—'}</div>
      </div>
      ${kmRodado>0?`<div style="font-size:11px;font-weight:700;color:#854F0B;margin-bottom:8px">📏 ${kmRodado.toLocaleString('pt-BR')} km rodados · ⏱ ${duracao}</div>`:''}
      ${saidasAt.length>0?`<table style="width:100%;border-collapse:collapse;font-size:10px">
        <thead><tr><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Local</th><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Solicitante</th><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Motivo</th><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Saída</th><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Retorno</th><th style="background:#FFB02E;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Duração</th></tr></thead>
        <tbody>${saidasRows}</tbody>
      </table>`:'<p style="color:#7C8AAE;font-size:10px">Sem saídas registradas.</p>'}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
  <title>Relatório — ${valor}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;font-size:11px;padding:18px}
  .header{border-bottom:3px solid #FFB02E;padding-bottom:10px;margin-bottom:14px}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .kpi-box{background:#FFF3CD;border:1px solid #FFB02E55;border-radius:6px;padding:10px;text-align:center}
  .kpi-box .v{font-size:18px;font-weight:800;color:#854F0B}
  .kpi-box .l{font-size:9px;color:#7C8AAE;margin-top:2px}
  td{padding:4px 6px;border-bottom:1px solid #e0e4f0}
  .footer{margin-top:14px;font-size:9px;color:#aaa;text-align:right}
  @media print{body{padding:10px}@page{margin:8mm;size:A4}}</style>
  </head><body>
  <div class="header">
    <div style="font-size:16px;font-weight:800">🚛 Frota Conecta</div>
    <div style="font-size:12px;color:#7C8AAE;margin-top:2px">Relatório de Atendimentos — ${tipo==='motorista'?'Motorista':'Veículo'}: <strong style="color:#1a1a2e">${valor}</strong></div>
    <div style="font-size:10px;color:#7C8AAE;margin-top:4px">Período: ${new Date(dataIni).toLocaleDateString('pt-BR')} a ${new Date(dataFim).toLocaleDateString('pt-BR')}</div>
  </div>
  <div class="kpi-row">
    <div class="kpi-box"><div class="v">${atsFiltrados.length}</div><div class="l">Registros de veículo</div></div>
    <div class="kpi-box"><div class="v">${totalSaidas}</div><div class="l">Total de saídas</div></div>
    <div class="kpi-box"><div class="v">${totalKm.toLocaleString('pt-BR')} km</div><div class="l">KM total rodado</div></div>
  </div>
  ${blocos}
  <div class="footer">Frota Conecta · Gerado em ${fmt(Date.now())}</div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a2=document.createElement("a"); a2.href=url; a2.target="_blank"; a2.rel="noopener";
  document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
}

async function registrarSaida(atendimentoId, motorista, veiculo){
  const local=$("sa-local")?.value?.trim();
  const solicitante=$("sa-solicitante")?.value?.trim();
  const motivo=$("sa-motivo")?.value?.trim();
  if(!local||!solicitante||!motivo){setErro("sa-erro","Preencha todos os campos.");return;}
  $("sa-btn").disabled=true; $("sa-btn").innerHTML='<span class="spinner"></span> Registrando...';
  const saida={
    id:uid(), atendimentoId, motorista, veiculo,
    local, solicitante, motivo,
    saida: new Date().toISOString(),
    retorno: null, criadoEm: Date.now(),
    criadoPor: session.nome
  };
  try{
    await saveSaida(saida);
    showAtendimento();
  }catch(e){ setErro("sa-erro","Erro: "+e.message); $("sa-btn").disabled=false; $("sa-btn").innerHTML='🚀 Confirmar saída'; }
}

function calcKpis(recs){
  const resp=recs.filter(r=>r.respondidoEm);
  return {
    total:recs.length,
    tempoResp:resp.length?resp.reduce((a,r)=>a+(r.respondidoEm-r.enviadoEm),0)/resp.length:null,
    subs:recs.filter(r=>r.veiculoSubstituido===true).length,
    sinistros:recs.filter(r=>r.tipo==="sinistro").length
  };
}

let filtroAtual="todos";
function filtrar(f){
  filtroAtual=f;
  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.toggle("active",b.dataset.filtro===f));
  aplicarFiltros();
}
function aplicarFiltros(){
  const motorista=$("filtro-motorista")?.value||"";
  const urgencia=$("filtro-urgencia")?.value||"";
  const dataIni=$("filtro-data-ini")?.value?new Date($("filtro-data-ini").value).getTime():null;
  const dataFim=$("filtro-data-fim")?.value?new Date($("filtro-data-fim").value).getTime()+86399999:null;
  let fil=records;
  if(filtroAtual!=="todos") fil=fil.filter(r=>r.status===filtroAtual);
  if(motorista) fil=fil.filter(r=>r.motorista===motorista);
  if(urgencia) fil=fil.filter(r=>r.urgencia===urgencia);
  if(dataIni) fil=fil.filter(r=>r.criadoEm>=dataIni);
  if(dataFim) fil=fil.filter(r=>r.criadoEm<=dataFim);
  if($("lista-recs")) $("lista-recs").innerHTML=renderRecordsFiltered(fil);
}

function renderRecords(recs,f){
  const fil=f==="todos"?recs:f==="sinistro"?recs.filter(r=>r.tipo==="sinistro"):recs.filter(r=>r.status===f);
  return renderRecordsFiltered(fil);
}
function renderRecordsFiltered(fil){
  if(!fil.length) return '<p style="color:#5C6889;font-size:13px;text-align:center;padding:32px 0">Nenhuma solicitação encontrada.</p>';
  return fil.map(r=>{
    const urg=URGENCIA.find(u=>u.id===r.urgencia);
    return `<button class="sol-item" onclick="showDetalhe('${r.id}')">
      <div style="min-width:0;flex:1">
        <div style="display:flex;align-items:center;gap:6px">

      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${badge(r.status)}<span style="color:#5C6889">›</span></div>

  }).join("");
}

async function updateStatus(id,status){
  try{
    const rec=await api("PATCH",`/api/solicitacoes/${id}`,{status});
    const idx=records.findIndex(r=>r.id===id);
    if(idx>=0) records[idx]=rec;
    showDetalhe(id);
  }catch(e){ alert("Erro: "+e.message); }
}

async function updateSub(id,v){
  try{
    const rec=await api("PATCH",`/api/solicitacoes/${id}`,{veiculoSubstituido:v,placaSubstituta:v?records.find(r=>r.id===id)?.placaSubstituta:null});
    const idx=records.findIndex(r=>r.id===id);
    if(idx>=0) records[idx]=rec;
    showDetalhe(id);
  }catch(e){ alert("Erro: "+e.message); }
}

async function savePlacaSub(id){
  const v=$("placa-sub-input")?.value?.trim().toUpperCase();
  if(!v) return;
  try{
    const rec=await api("PATCH",`/api/solicitacoes/${id}`,{placaSubstituta:v});
    const idx=records.findIndex(r=>r.id===id);
    if(idx>=0) records[idx]=rec;
    showDetalhe(id);
  }catch(e){ alert("Erro: "+e.message); }
}

async function aprovarUsuario(id, nome){
  if(!confirm(`Aprovar o cadastro de ${nome}?`)) return;
  try{
    await api("PATCH",`/api/usuarios/${id}`,{aprovado:true});
    await showGestor("aprovacoes");
  }catch(e){ alert("Erro ao aprovar: "+e.message); }
}

async function rejeitarUsuario(id, nome){
  if(!confirm(`Rejeitar e excluir o cadastro de ${nome}? Essa ação não pode ser desfeita.`)) return;
  try{
    await api("DELETE",`/api/usuarios/${id}`);
    await showGestor("aprovacoes");
  }catch(e){ alert("Erro ao rejeitar: "+e.message); }
}

async function renderAtendimento(filtroData='', filtroMotorista=''){
  const ats = await loadAtendimentos();
  const motoristasLista = [...new Set(ats.map(a=>a.motorista))].filter(Boolean).sort();
  
  let filtrados = [...ats];
  if(filtroData) filtrados = filtrados.filter(a=>a.dataEntrega?.slice(0,10)===filtroData);
  if(filtroMotorista) filtrados = filtrados.filter(a=>a.motorista===filtroMotorista);
  
  const emUso = ats.filter(a=>!a.dataDevolucao).length;
  const totalHoje = ats.filter(a=>a.dataEntrega?.slice(0,10)===new Date().toISOString().slice(0,10)).length;
  const comDev = ats.filter(a=>a.dataDevolucao&&a.kmFinal&&a.kmInicial);
  const tempoMedio = comDev.length ? comDev.reduce((acc,a)=>acc+(new Date(a.dataDevolucao)-new Date(a.dataEntrega)),0)/comDev.length : null;

  return `
    <div class="kpi-grid" style="margin-bottom:12px">
      <div class="kpi"><div class="kpi-label">Total registros</div><div class="kpi-value">${filtrados.length}</div></div>
      <div class="kpi"><div class="kpi-label">Em uso agora</div><div class="kpi-value" style="color:#D9A441">${emUso}</div></div>
      <div class="kpi"><div class="kpi-label">Hoje</div><div class="kpi-value" style="color:#FFB02E">${totalHoje}</div></div>
      <div class="kpi"><div class="kpi-label">Tempo médio</div><div class="kpi-value" style="font-size:14px">${tempoMedio?dur(tempoMedio):'—'}</div></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <p class="field-label" style="margin-bottom:8px">🔍 Filtros</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <label class="field-label">Data</label>
          <input type="date" id="at-filtro-data" value="${filtroData}" onchange="atualizarFiltrosAt()" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:7px;color:#fff;font-size:12px"/>
        </div>
        <div>
          <label class="field-label">Motorista</label>
          <select id="at-filtro-mot" onchange="atualizarFiltrosAt()" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:7px;color:#fff;font-size:12px">
            <option value="">Todos</option>
            ${motoristasLista.map(m=>`<option value="${m}" ${filtroMotorista===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" style="margin-bottom:12px" onclick="showNovoAtendimento()">+ Registrar entrega de veículo</button>

    <p class="field-label" style="margin-bottom:8px">${filtrados.length} registro(s)</p>
    ${filtrados.length===0?`<div class="card" style="text-align:center;padding:32px;border-style:dashed"><p style="font-size:32px;margin-bottom:8px">🚐</p><p style="color:#5C6889">Nenhum registro encontrado.</p></div>`:''}
    ${filtrados.map(a=>{
      const kmRodado = a.kmFinal&&a.kmInicial ? (parseFloat(a.kmFinal)-parseFloat(a.kmInicial)) : null;
      const duracao = a.dataDevolucao ? dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)) : null;
      return `<div class="card" style="margin-bottom:8px;cursor:pointer;border-left:3px solid ${a.dataDevolucao?'#2E7D32':'#D9A441'}" onclick="showDetalheAtendimento('${a.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="min-width:0;flex:1">
            <div style="color:#fff;font-weight:700;font-size:14px">👤 ${a.motorista}</div>
            <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🚗 ${a.veiculo||'—'} · 📅 ${a.dataEntrega?new Date(a.dataEntrega).toLocaleString('pt-BR'):'-'}</div>
            <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🛣 KM inicial: ${a.kmInicial?Number(a.kmInicial).toLocaleString('pt-BR')+' km':'—'}</div>
            ${kmRodado?`<div style="color:#FFB02E;font-size:12px;font-weight:700;margin-top:2px">📏 ${Number(kmRodado).toLocaleString('pt-BR')} km rodados · ⏱ ${duracao}</div>`:''}
          </div>
          <span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;flex-shrink:0;background:${a.dataDevolucao?'#2E7D3222':'#D9A44122'};color:${a.dataDevolucao?'#81C784':'#FFB02E'};border:1px solid ${a.dataDevolucao?'#2E7D3255':'#D9A44155'}">
            ${a.dataDevolucao?'✅ Devolvido':'🔑 Em uso'}
          </span>
        </div>
      </div>`;
    }).join('')}
    ${filtrados.length>0?`<button onclick="exportarPDFAtendimentos()" class="btn btn-ghost btn-sm" style="margin-top:8px;width:auto">📄 Exportar relatório</button>`:''}
  `;
}


async function atualizarFiltrosAt(){
  const data = document.getElementById('at-filtro-data')?.value||'';
  const mot = document.getElementById('at-filtro-mot')?.value||'';
  const html = await renderAtendimento(data, mot);
  const main = document.getElementById('main');
  if(main){
    const tabs = main.querySelector('.tabs-gestor');
    main.innerHTML = main.innerHTML.replace(/<div[^>]*id="conteudo-aba"[^>]*>.*<\/div>/s, `<div id="conteudo-aba">${html}</div>`);
  }
  await showGestor('atendimento');
}

  render('<div style="text-align:center;padding:40px 0"><span style="color:#7C8AAE">Carregando motoristas...</span></div>');

    render(`

function iniciarSigEntrega(){
  sigEntregaCanvas = document.getElementById('sig-entrega');
  if(!sigEntregaCanvas) return;
  sigEntregaCanvas.width = sigEntregaCanvas.offsetWidth * window.devicePixelRatio;
  sigEntregaCanvas.height = sigEntregaCanvas.offsetHeight * window.devicePixelRatio;
  sigEntregaCtx = sigEntregaCanvas.getContext('2d');
  sigEntregaCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  sigEntregaCtx.strokeStyle='#1a1a2e'; sigEntregaCtx.lineWidth=2.5; sigEntregaCtx.lineCap='round';
  function getPos(e){ const r=sigEntregaCanvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:(s.clientX-r.left),y:(s.clientY-r.top)}; }
  sigEntregaCanvas.addEventListener('mousedown',e=>{sigEntregaDesenhando=true;const p=getPos(e);sigEntregaCtx.beginPath();sigEntregaCtx.moveTo(p.x,p.y);});
  sigEntregaCanvas.addEventListener('mousemove',e=>{if(!sigEntregaDesenhando)return;const p=getPos(e);sigEntregaCtx.lineTo(p.x,p.y);sigEntregaCtx.stroke();});
  sigEntregaCanvas.addEventListener('mouseup',()=>sigEntregaDesenhando=false);
  sigEntregaCanvas.addEventListener('touchstart',e=>{e.preventDefault();sigEntregaDesenhando=true;const p=getPos(e);sigEntregaCtx.beginPath();sigEntregaCtx.moveTo(p.x,p.y);},{passive:false});
  sigEntregaCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!sigEntregaDesenhando)return;const p=getPos(e);sigEntregaCtx.lineTo(p.x,p.y);sigEntregaCtx.stroke();},{passive:false});
  sigEntregaCanvas.addEventListener('touchend',()=>sigEntregaDesenhando=false);
}
function limparSigEntrega(){ if(sigEntregaCtx&&sigEntregaCanvas) sigEntregaCtx.clearRect(0,0,sigEntregaCanvas.width,sigEntregaCanvas.height); }
function getSigEntrega(){ if(!sigEntregaCanvas) return null; const b=document.createElement('canvas'); b.width=sigEntregaCanvas.width; b.height=sigEntregaCanvas.height; return sigEntregaCanvas.toDataURL()===b.toDataURL()?null:sigEntregaCanvas.toDataURL(); }

async function salvarAtendimento(){
  const motorista = document.getElementById('at-motorista')?.value?.trim();
  const veiculo = document.getElementById('at-veiculo')?.value?.trim().toUpperCase();
  const dataEntrega = document.getElementById('at-saida')?.value;
  const kmInicial = document.getElementById('at-km-ini')?.value;
  const obs = document.getElementById('at-obs')?.value?.trim();
  
  if(!motorista||!veiculo||!dataEntrega||!kmInicial){ setErro("at-erro","Preencha todos os campos obrigatórios."); return; }

  const pin = document.getElementById('at-pin')?.value?.trim();
  if(!pin||pin.length<4){ setErro("at-pin-erro","O motorista deve digitar o PIN para confirmar."); return; }
  
  document.getElementById('at-btn').disabled=true;
  document.getElementById('at-btn').innerHTML='<span class="spinner"></span> Validando...';

  const pinOk = await verificarPinMotorista(motorista, pin);
  if(!pinOk){
    setErro("at-pin-erro","PIN incorreto ou motorista não cadastrado/aprovado.");
    document.getElementById('at-btn').disabled=false;
    document.getElementById('at-btn').innerHTML='🔑 Registrar entrega';
    return;
  }
  document.getElementById('at-btn').innerHTML='<span class="spinner"></span> Salvando...';

  const atendimento = {
    id: uid(), motorista, veiculo, dataEntrega, kmInicial,
    dataDevolucao: null, kmFinal: null, kmRodado: null,
    obs,
    validadoPinEntrega: true,
    codigoValidacaoEntrega: gerarCodigoValidacao(),
    validadoPorEntrega: motorista,
    criadoEm: Date.now(), criadoPor: session.nome
  };

  try{
    await saveAtendimento(atendimento);
    session.role==='atendimento'?showAtendimento():showGestor('atendimento');
  }catch(e){
    setErro("at-erro","Erro ao salvar: "+e.message);
    document.getElementById('at-btn').disabled=false;
    document.getElementById('at-btn').innerHTML='🔑 Registrar entrega';
  }
}

async function registrarDevolucao(id, kmInicial, motoristaNome){
  const dataDevolucao = document.getElementById('at-dev-data')?.value;
  const kmFinal = document.getElementById('at-dev-km')?.value;
  const obsDev = document.getElementById('at-dev-obs')?.value?.trim();
  if(!dataDevolucao||!kmFinal){ setErro("at-dev-erro","Preencha data e KM final."); return; }

  const pin = document.getElementById('at-dev-pin')?.value?.trim();
  if(!pin||pin.length<4){ setErro("at-dev-pin-erro","O motorista deve digitar o PIN para confirmar."); return; }

  const kmRodado = kmFinal&&kmInicial ? parseFloat(kmFinal)-parseFloat(kmInicial) : null;
  document.getElementById('at-dev-btn').disabled=true;
  document.getElementById('at-dev-btn').innerHTML='<span class="spinner"></span> Validando...';

  const pinOk = await verificarPinMotorista(motoristaNome, pin);
  if(!pinOk){
    setErro("at-dev-pin-erro","PIN incorreto ou motorista não encontrado.");
    document.getElementById('at-dev-btn').disabled=false;
    document.getElementById('at-dev-btn').innerHTML='✅ Confirmar devolução';
    return;
  }
  document.getElementById('at-dev-btn').innerHTML='<span class="spinner"></span>';

  try{
    await updateAtendimento(id,{
      dataDevolucao, kmFinal, kmRodado, obsDev,
      validadoPinDevolucao: true,
      codigoValidacaoDevolucao: gerarCodigoValidacao(),
      validadoPorDevolucao: motoristaNome
    });
    session.role==='atendimento'?showAtendimento():showGestor('atendimento');
  }catch(e){ setErro("at-dev-erro","Erro: "+e.message); document.getElementById('at-dev-btn').disabled=false; document.getElementById('at-dev-btn').innerHTML='✅ Confirmar devolução'; }
}

async function addEmail(){

  showGestor("emails");

// ===== ASSINATURA DIGITAL =====
let sigCanvas = null, sigCtx = null, sigDesenhando = false;

function iniciarAssinatura(){
  sigCanvas = document.getElementById('sig-canvas');
  if(!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.strokeStyle = '#1a1a2e';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';

  function getPos(e){
    const rect = sigCanvas.getBoundingClientRect();
    const scaleX = sigCanvas.width / rect.width;
    const scaleY = sigCanvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top) * scaleY
    };
  }

  function start(e){ e.preventDefault(); sigDesenhando=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }
  function draw(e){ e.preventDefault(); if(!sigDesenhando) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); }
  function stop(e){ e.preventDefault(); sigDesenhando=false; }

  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', draw);
  sigCanvas.addEventListener('mouseup', stop);
  sigCanvas.addEventListener('touchstart', start, {passive:false});
  sigCanvas.addEventListener('touchmove', draw, {passive:false});
  sigCanvas.addEventListener('touchend', stop, {passive:false});
}

function limparAssinatura(){
  if(sigCtx && sigCanvas) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
}

function getAssinaturaBase64(){
  if(!sigCanvas) return null;
  const blank = document.createElement('canvas');
  blank.width = sigCanvas.width; blank.height = sigCanvas.height;
  if(sigCanvas.toDataURL() === blank.toDataURL()) return null;
  return sigCanvas.toDataURL('image/png');
}

function calcularKmRodado(){
  const kmAtual = parseFloat(document.getElementById('cl-km')?.value)||0;
  const kmSaida = parseFloat(document.getElementById('cl-km-saida')?.value)||0;
  const display = document.getElementById('km-rodado-display');
  if(display && kmAtual > 0 && kmSaida > 0){
    const rodado = kmAtual - kmSaida;
    display.textContent = rodado > 0 ? `🛣 KM rodado na viagem: ${rodado.toLocaleString('pt-BR')} km` : '⚠ KM atual menor que KM de saída';
    display.style.color = rodado > 0 ? '#FFB02E' : '#C0392B';
  } else if(display) {
    display.textContent = '';
  }
}

function responderItem(idx, ok){
  checklistRespostas[idx].ok = ok;

    nokBtn.style.background='transparent'; nokBtn.style.color='#7C8AAE'; nokBtn.style.borderColor='#2C3550';

async function adicionarFotoItem(idx, input){

  try{

    const preview = $(`cl-foto-preview-${idx}`);
    if(preview) preview.innerHTML = `<img src="${foto}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:8px"/>`;
  }catch(e){ alert("Erro ao processar foto."); }
}

async function enviarChecklist(){
  const placa = $("cl-placa")?.value?.trim().toUpperCase();
  const modelo = $("cl-modelo")?.value?.trim();
  const km = $("cl-km")?.value;
  const obsGeral = $("cl-obs-geral")?.value?.trim();
  if(!placa){ setErro("cl-erro","Informe a placa."); return; }
  if(!km){ setErro("cl-erro","Informe o KM do odômetro."); return; }
  if(checklistTipo.startsWith('viagem')){
    if(!$("cl-condutor")?.value?.trim()){ setErro("cl-erro","Informe o nome do condutor."); return; }
    if(!$("cl-destino")?.value?.trim()){ setErro("cl-erro","Informe o destino da viagem."); return; }
  }
  const naoRespondidos = checklistRespostas.filter(r=>r.ok===null);
  if(naoRespondidos.length>0){ setErro("cl-erro",`Responda todos os itens. Faltam ${naoRespondidos.length}.`); return; }

  const pin = $("cl-pin")?.value?.trim();
  if(!pin||pin.length<4){ setErro("cl-pin-erro","Digite seu PIN para validar o documento."); return; }

  $("cl-btn").disabled=true; $("cl-btn").innerHTML='<span class="spinner"></span> Validando...';
  const pinOk = await verificarPinUsuario(pin);
  if(!pinOk){
    setErro("cl-pin-erro","PIN incorreto. Tente novamente.");
    $("cl-btn").disabled=false; $("cl-btn").innerHTML='✅ Finalizar e gerar PDF';
    return;
  }
  $("cl-btn").innerHTML='<span class="spinner"></span> Salvando...';
  
  const temNOK = checklistRespostas.some(r=>r.ok===false);
  const isViagem = checklistTipo.startsWith('viagem');
  const condutor = $("cl-condutor")?.value?.trim()||'';
  const destino = $("cl-destino")?.value?.trim()||'';
  const dtSaida = $("cl-dt-saida")?.value||'';
  const dtRetornoPrev = $("cl-dt-retorno-prev")?.value||'';
  const dtRetorno = $("cl-dt-retorno")?.value||'';
  const codigoValidacao = gerarCodigoValidacao();

  const checklist = {
    id: uid(), motorista: session.nome, placa, modelo: modelo||'',
    km, 
    kmSaida: $('cl-km-saida')?.value||null,
    kmRodado: ($('cl-km')?.value && $('cl-km-saida')?.value) ? (parseFloat($('cl-km').value) - parseFloat($('cl-km-saida').value)) : null,
    obsGeral: obsGeral||'',
    tipo: checklistTipo, criadoEm: Date.now(),
    // Dados de viagem
    condutor: isViagem?condutor:'',
    destino: isViagem?destino:'',
    dtSaida: dtSaida||'',
    dtRetornoPrev: dtRetornoPrev||'',
    dtRetorno: dtRetorno||'',
    fotoCNH: isViagem?fotoCNHdata:null,
    assinatura: getAssinaturaBase64(),
    validadoPin: true,
    codigoValidacao,
    itens: checklistRespostas,
    fotosAngulos: checklistFotosAngulos,
    obsAngulos: {...checklistObsAngulos},
    temNOK
  };
  
  try{
    await saveChecklistEnviado(checklist);
    const pdfUrl = gerarPDFChecklist(checklist);
    showSucessoChecklist(checklist, pdfUrl);
  }catch(e){
    setErro("cl-erro","Erro ao salvar: "+e.message);
    $("cl-btn").disabled=false; $("cl-btn").innerHTML='✅ Finalizar e gerar PDF';
  }
}

  render(`

      <h3 style="font-size:18px;font-weight:800">${cl.temNOK?'Checklist com pendências':'Checklist OK!'}</h3>

      ${nok.map(i=>`<div style="color:#FFB0A0;font-size:13px;padding:4px 0;border-bottom:1px solid #C0392B22">• ${i.item}${i.obs?` — ${i.obs}`:''}</div>`).join("")}

      <label class="field-label">Categoria</label>
      <input class="field-input" id="cl-nova-cat" placeholder="Ex: Pneus, Fluidos, Documentos" list="cat-list"/>
      <datalist id="cat-list">${categorias.map(c=>`<option value="${c}">`).join("")}</datalist>
      <label class="field-label">Tipo</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
        ${['saida','retorno','ambos'].map(t=>`<button onclick="selectTipoChecklist('${t}')" id="cl-tipo-${t}"
          style="padding:8px;border-radius:8px;border:1px solid ${t==='ambos'?'#FFB02E':'#2C3550'};background:${t==='ambos'?'#FFB02E22':'transparent'};color:${t==='ambos'?'#FFB02E':'#7C8AAE'};cursor:pointer;font-size:12px;font-weight:600">
          ${t==='saida'?'🚀 Saída':t==='retorno'?'🏁 Retorno':'↕ Ambos'}
        </button>`).join("")}
      </div>
      <button class="btn btn-primary" onclick="adicionarItemChecklist()">➕ Adicionar item</button>
    </div>
    ${categorias.map(cat=>`
      <div style="margin-bottom:12px">
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#FFB02E;font-weight:700;margin-bottom:8px">${cat}</p>
        ${items.filter(i=>(i.categoria||'Geral')===cat).map(i=>`
          <div class="card" style="margin-bottom:6px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;opacity:${i.ativo!==false?1:0.5}">
            <div>
              <div style="color:#fff;font-size:13px;font-weight:600">${i.item}</div>
              <div style="color:#7C8AAE;font-size:11px">${i.tipo==='saida'?'🚀 Saída':i.tipo==='retorno'?'🏁 Retorno':'↕ Ambos'}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button onclick="toggleItemChecklist('${i.id}')" style="padding:4px 8px;border-radius:6px;border:1px solid ${i.ativo!==false?'#D9A441':'#2E7D32'};background:transparent;color:${i.ativo!==false?'#D9A441':'#81C784'};cursor:pointer;font-size:11px">${i.ativo!==false?'Desativar':'Ativar'}</button>
              <button onclick="deletarItemChecklist('${i.id}')" style="padding:4px 8px;border-radius:6px;border:1px solid #C0392B;background:#C0392B22;color:#FF9B8A;cursor:pointer;font-size:11px">✕</button>
            </div>
          </div>`).join("")}
      </div>`).join("")}
    ${items.length===0?`<div class="card" style="text-align:center;padding:32px;border-style:dashed"><p style="font-size:32px;margin-bottom:8px">📋</p><p style="color:#5C6889">Nenhum item cadastrado ainda.</p></div>`:''}
    ${enviados.length>0?`
    <div style="margin-top:16px">
      <p class="field-label" style="margin-bottom:8px">Checklists recebidos</p>
      ${enviados.slice(0,10).map(c=>`
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="color:#fff;font-weight:600;font-size:14px">${c.tipo==='viagem-saida'?'Viagem Saída':c.tipo==='viagem-retorno'?'Viagem Retorno':c.tipo==='mensal'?'Mensal':'Vistoria'} ${c.placa} — ${c.motorista}</div>
              <div style="color:#7C8AAE;font-size:12px">${fmt(c.criadoEm)}${c.km?' · 🛣 '+Number(c.km).toLocaleString('pt-BR')+' km':''}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${c.temNOK?'#C0392B22':'#2E7D3222'};color:${c.temNOK?'#FF9B8A':'#81C784'}">${c.temNOK?'⚠ Pendências':'✅ OK'}</span>
              <button onclick="abrirPDFChecklistGestor('${c.id}')" style="padding:3px 8px;border-radius:6px;border:1px solid #FFB02E;background:#FFB02E22;color:#FFB02E;cursor:pointer;font-size:10px;font-weight:700">📄 PDF</button>
            </div>
          </div>
        </div>`).join("")}
    </div>`:''}
  `;
}

async function abrirPDFChecklistGestor(id){
  const todos = await loadChecklistsEnviados();
  const cl = todos.find(c=>c.id===id);
  if(!cl) return;
  const url = gerarPDFChecklist(cl);
  const a = document.createElement('a'); a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

let clTipoSel = 'ambos';
function selectTipoChecklist(t){
  clTipoSel=t;
  ['saida','retorno','ambos'].forEach(x=>{
    const btn=$(`cl-tipo-${x}`);
    if(btn){
      const active=x===t;
      btn.style.borderColor=active?'#FFB02E':'#2C3550';
      btn.style.background=active?'#FFB02E22':'transparent';
      btn.style.color=active?'#FFB02E':'#7C8AAE';
    }
  });
}

async function adicionarItemChecklist(){
  const item=$("cl-novo-item")?.value?.trim();
  const cat=$("cl-nova-cat")?.value?.trim()||'Geral';
  if(!item){alert("Digite o nome do item.");return;}
  const items=await loadChecklistItems();
  items.push({id:uid(),item,categoria:cat,tipo:clTipoSel,ativo:true,criadoEm:Date.now()});
  await saveChecklistItems(items);
  await showGestor('checklist');
}

async function atualizarFiltrosChecklist(){
  const mot = document.getElementById('cl-filtro-mot')?.value||'';
  const tipo = document.getElementById('cl-filtro-tipo')?.value||'';
  const ini = document.getElementById('cl-filtro-ini')?.value||'';
  const fim = document.getElementById('cl-filtro-fim')?.value||'';
  const html = await renderGestorChecklist(mot, tipo, ini, fim);
  document.getElementById('main').innerHTML = `
    <div class="tabs" style="overflow-x:auto;white-space:nowrap">
      <button class="tab active-amber" style="padding:8px 12px;font-size:12px">✅ Checklist</button>
    </div>
    ${html}`;
}

async function toggleItemChecklist(id){
  const items=await loadChecklistItems();
  const idx=items.findIndex(i=>i.id===id);
  if(idx>=0){ items[idx].ativo=!items[idx].ativo; await saveChecklistItems(items); await showGestor('checklist'); }
}

async function deletarItemChecklist(id){
  if(!confirm("Remover este item?")) return;
  const items=(await loadChecklistItems()).filter(i=>i.id!==id);
  await saveChecklistItems(items); await showGestor('checklist');
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  deferredPrompt = null;
});

async function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      document.getElementById('install-banner').style.display = 'none';
    }
    deferredPrompt = null;
  } else {
    alert('Para instalar:\n\n1. Toque nos 3 pontinhos ⋮\n2. Toque em "Adicionar à tela inicial"\n\nOu use o Samsung Internet para instalar mais facilmente.');
  }
}

async function init(){
  ping();
  pingInterval=setInterval(ping,10*60*1000);
  // Sempre mostra a tela de escolha de perfil ao abrir o app
  session = null;
  showLogin();
}

init();

// Desregistrar service workers antigos
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}
</script>
