async function renderAtendimento(filtroData='', filtroMotorista='', busca='', mostrarDevolvidos=false){
  const ats = await loadAtendimentos();


  const motoristasLista = [...new Set(ats.map(a=>a.motorista))].filter(Boolean).sort();
  
  let filtrados = [...ats];
  if(!mostrarDevolvidos) filtrados = filtrados.filter(a=>!a.dataDevolucao);
  if(filtroData) filtrados = filtrados.filter(a=>a.dataEntrega?.slice(0,10)===filtroData);
  if(filtroMotorista) filtrados = filtrados.filter(a=>a.motorista===filtroMotorista);
  if(busca?.trim()){
    const termo = busca.trim().toLowerCase();
    let base = ats;
    filtrados = base.filter(a=>
      (a.motorista?.toLowerCase().includes(termo) || a.veiculo?.toLowerCase().includes(termo)) &&
      (!filtroData || a.dataEntrega?.slice(0,10)===filtroData) &&
      (!filtroMotorista || a.motorista===filtroMotorista)
    );
  }
  
  const emUso = ats.filter(a=>!a.dataDevolucao).length;
  const totalHoje = ats.filter(a=>a.dataEntrega?.slice(0,10)===new Date().toISOString().slice(0,10)).length;
  const comDev = ats.filter(a=>a.dataDevolucao&&a.kmFinal&&a.kmInicial);
  const tempoMedio = comDev.length ? comDev.reduce((acc,a)=>acc+(new Date(a.dataDevolucao)-new Date(a.dataEntrega)),0)/comDev.length : null;

  filtrados.sort((a,b)=>{
    const aAberto = a.dataDevolucao ? 1 : 0;
    const bAberto = b.dataDevolucao ? 1 : 0;
    if(aAberto!==bAberto) return aAberto-bAberto;
    return new Date(b.dataEntrega)-new Date(a.dataEntrega);
  });

  return `
    <div class="kpi-grid" style="margin-bottom:12px">
      <div class="kpi"><div class="kpi-label">Em uso agora</div><div class="kpi-value" style="color:#1F5C8C">${emUso}</div></div>
      <div class="kpi"><div class="kpi-label">Hoje</div><div class="kpi-value" style="color:#2E86D9">${totalHoje}</div></div>
      <div class="kpi"><div class="kpi-label">Total histórico</div><div class="kpi-value">${ats.length}</div></div>
      <div class="kpi"><div class="kpi-label">Tempo médio</div><div class="kpi-value" style="font-size:14px">${tempoMedio?dur(tempoMedio):'—'}</div></div>
    </div>

    <input id="at-busca" placeholder="🔍 Buscar por motorista ou placa..." value="${busca}"
      style="width:100%;background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:10px"
      oninput="atualizarFiltrosAt()"/>

    <div class="card" style="margin-bottom:12px">
      <p class="field-label" style="margin-bottom:8px">🔍 Filtros</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <label class="field-label">Data</label>
          <input type="date" id="at-filtro-data" value="${filtroData}" onchange="atualizarFiltrosAt()" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:7px;color:#fff;font-size:12px"/>
        </div>
        <div>
          <label class="field-label">Motorista</label>
          <select id="at-filtro-mot" onchange="atualizarFiltrosAt()" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:7px;color:#fff;font-size:12px">
            <option value="">Todos</option>
            ${motoristasLista.map(m=>`<option value="${m}" ${filtroMotorista===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:6px;color:#7C8AAE;font-size:12px;cursor:pointer">
        <input type="checkbox" id="at-mostrar-devolvidos" ${mostrarDevolvidos?'checked':''} onchange="atualizarFiltrosAt()" style="accent-color:#2E86D9"/>
        Mostrar veículos já devolvidos
      </label>
    </div>

    <button class="btn btn-primary" style="margin-bottom:12px" onclick="showNovoAtendimento()">+ Registrar entrega de veículo</button>

    <p class="field-label" style="margin-bottom:8px">${filtrados.length} registro(s)</p>
    ${filtrados.length===0?`<div class="card" style="text-align:center;padding:32px;border-style:dashed"><p style="font-size:32px;margin-bottom:8px">🚐</p><p style="color:#5C6889">${mostrarDevolvidos||busca?'Nenhum registro encontrado.':'Nenhum veículo em uso no momento.'}</p></div>`:''}
    ${filtrados.map(a=>{
      const kmRodado = a.kmFinal&&a.kmInicial ? (parseFloat(a.kmFinal)-parseFloat(a.kmInicial)) : null;
      const duracao = a.dataDevolucao ? dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)) : null;
      return `<div class="card" style="margin-bottom:8px;cursor:pointer;border-left:3px solid ${a.dataDevolucao?'#2E7D32':'#1F5C8C'}" onclick="showDetalheAtendimento('${a.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="min-width:0;flex:1">
            <div style="color:#fff;font-weight:700;font-size:14px">👤 ${a.motorista}</div>
            <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🚗 ${a.veiculo||'—'} · 📅 ${a.dataEntrega?new Date(a.dataEntrega).toLocaleString('pt-BR'):'-'}</div>
            <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🛣 KM inicial: ${a.kmInicial?Number(a.kmInicial).toLocaleString('pt-BR')+' km':'—'}</div>
            ${kmRodado?`<div style="color:#2E86D9;font-size:12px;font-weight:700;margin-top:2px">📏 ${Number(kmRodado).toLocaleString('pt-BR')} km rodados · ⏱ ${duracao}</div>`:''}
          </div>
          <span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;flex-shrink:0;background:${a.dataDevolucao?'#2E7D3222':'#1F5C8C22'};color:${a.dataDevolucao?'#81C784':'#2E86D9'};border:1px solid ${a.dataDevolucao?'#2E7D3255':'#1F5C8C55'}">
            ${a.dataDevolucao?'✅ Devolvido':'🔑 Em uso'}
          </span>
        </div>
      </div>`;
    }).join('')}
    ${filtrados.length>0?`<button onclick="exportarPDFAtendimentos()" class="btn btn-ghost btn-sm" style="margin-top:8px;width:auto">📄 Exportar relatório</button>`:''}
  `;
}


async function atualizarFiltrosAt(){
  const data = document.getElementById('at-filtro-data')?.value||'';
  const mot = document.getElementById('at-filtro-mot')?.value||'';
  const busca = document.getElementById('at-busca')?.value||'';
  const mostrarDevolvidos = document.getElementById('at-mostrar-devolvidos')?.checked||false;
  const cursorPos = document.getElementById('at-busca')?.selectionStart;
  const html = await renderAtendimento(data, mot, busca, mostrarDevolvidos);
  const cont = document.getElementById('aba-conteudo');
  if(cont){
    cont.innerHTML = html;
    const inp = document.getElementById('at-busca');
    if(inp && document.activeElement!==inp){ inp.focus(); if(cursorPos!=null) inp.setSelectionRange(cursorPos,cursorPos); }
  }
}

function iniciarSigEntrega(){
  sigEntregaCanvas = document.getElementById('sig-entrega');
  if(!sigEntregaCanvas) return;
  sigEntregaCanvas.width = sigEntregaCanvas.offsetWidth * window.devicePixelRatio;
  sigEntregaCanvas.height = sigEntregaCanvas.offsetHeight * window.devicePixelRatio;
  sigEntregaCtx = sigEntregaCanvas.getContext('2d');
  sigEntregaCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  sigEntregaCtx.strokeStyle='#1a1a2e'; sigEntregaCtx.lineWidth=2.5; sigEntregaCtx.lineCap='round';
  function getPos(e){ const r=sigEntregaCanvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:(s.clientX-r.left),y:(s.clientY-r.top)}; }
  sigEntregaCanvas.addEventListener('mousedown',e=>{sigEntregaDesenhando=true;const p=getPos(e);sigEntregaCtx.beginPath();sigEntregaCtx.moveTo(p.x,p.y);});
  sigEntregaCanvas.addEventListener('mousemove',e=>{if(!sigEntregaDesenhando)return;const p=getPos(e);sigEntregaCtx.lineTo(p.x,p.y);sigEntregaCtx.stroke();});
  sigEntregaCanvas.addEventListener('mouseup',()=>sigEntregaDesenhando=false);
  sigEntregaCanvas.addEventListener('touchstart',e=>{e.preventDefault();sigEntregaDesenhando=true;const p=getPos(e);sigEntregaCtx.beginPath();sigEntregaCtx.moveTo(p.x,p.y);},{passive:false});
  sigEntregaCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!sigEntregaDesenhando)return;const p=getPos(e);sigEntregaCtx.lineTo(p.x,p.y);sigEntregaCtx.stroke();},{passive:false});
  sigEntregaCanvas.addEventListener('touchend',()=>sigEntregaDesenhando=false);
}
function limparSigEntrega(){ if(sigEntregaCtx&&sigEntregaCanvas) sigEntregaCtx.clearRect(0,0,sigEntregaCanvas.width,sigEntregaCanvas.height); }
function getSigEntrega(){ if(!sigEntregaCanvas) return null; const b=document.createElement('canvas'); b.width=sigEntregaCanvas.width; b.height=sigEntregaCanvas.height; return sigEntregaCanvas.toDataURL()===b.toDataURL()?null:sigEntregaCanvas.toDataURL(); }

async function buscarMotoristaAtendimento(termo){
  const div = document.getElementById('at-motorista-resultado');
  if(!div) return;

  if(!termo?.trim()){
    div.innerHTML='';
    const hidden = document.getElementById('at-motorista');
    if(hidden) hidden.value='';
    return;
  }

  let motoristas = [];
  try{
    const users = await api("GET","/api/usuarios");
    motoristas = users.filter(u=>u.role==='motorista'&&u.aprovado!==false&&u.ativo!==false);
  }catch(e){ motoristas=[]; }

  const t = termo.trim().toLowerCase();
  const encontrados = motoristas.filter(m=>m.nome?.toLowerCase().includes(t));

  if(!encontrados.length){
    div.innerHTML='<p style="color:#5C6889;font-size:12px;padding:6px 0">Nenhum motorista encontrado.</p>';
    return;
  }

  div.innerHTML = encontrados.map(m=>`
    <button onclick="selecionarMotoristaAtendimento('${m.nome.replace(/'/g,"\\'")}')"
      style="width:100%;text-align:left;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">

    </button>`).join('');
}

function selecionarMotoristaAtendimento(nome){
  document.getElementById('at-motorista').value = nome;
  const busca = document.getElementById('at-busca-motorista');
  const resultado = document.getElementById('at-motorista-resultado');
  if(busca) busca.value = nome;

function limparMotoristaAtendimento(){
  document.getElementById('at-motorista').value='';

async function checarVeiculoEmUso(placa){
  const div = document.getElementById('at-veiculo-aviso');
  if(!div) return;
  const p = placa?.trim().toUpperCase();
  if(!p){ div.innerHTML=''; return; }
  try{
    const todosAts = await loadAtendimentos();
    const emUso = todosAts.find(a=>!a.dataDevolucao && a.veiculo?.trim().toUpperCase()===p);
    if(emUso){
      div.innerHTML = `<p style="color:#FF9B8A;font-size:12px;margin-top:6px">⚠ Este veículo já está em atendimento com <strong>${emUso.motorista}</strong> desde ${new Date(emUso.dataEntrega).toLocaleString('pt-BR')}.</p>`;
    } else {
      div.innerHTML = `<p style="color:#81C784;font-size:12px;margin-top:6px">✅ Veículo livre pra atendimento.</p>`;
    }
  }catch(e){ div.innerHTML=''; }
}

async function salvarAtendimento(){
  const motorista = document.getElementById('at-motorista')?.value?.trim();
  const veiculo = document.getElementById('at-veiculo')?.value?.trim().toUpperCase();
  const dataEntrega = document.getElementById('at-saida')?.value;
  const kmInicial = document.getElementById('at-km-ini')?.value;
  const obs = document.getElementById('at-obs')?.value?.trim();
  
  if(!motorista||!veiculo||!dataEntrega||!kmInicial){ setErro("at-erro","Preencha todos os campos obrigatórios."); return; }

  try{
    const todosAts = await loadAtendimentos();
    const jaEmUso = todosAts.find(a=>!a.dataDevolucao && a.veiculo?.trim().toUpperCase()===veiculo);
    if(jaEmUso){
      setErro("at-erro",`Este veículo já está em atendimento com ${jaEmUso.motorista} desde ${new Date(jaEmUso.dataEntrega).toLocaleString('pt-BR')}. Registre a devolução antes de criar um novo atendimento.`);
      return;
    }
  }catch(e){ setErro("at-erro","Erro ao verificar disponibilidade do veículo: "+e.message); return; }

  const pin = document.getElementById('at-pin')?.value?.trim();
  if(!pin||pin.length<4){ setErro("at-pin-erro","O motorista deve digitar o PIN para confirmar."); return; }
  
  document.getElementById('at-btn').disabled=true;
  document.getElementById('at-btn').innerHTML='<span class="spinner"></span> Validando...';

  const pinOk = await verificarPinMotorista(motorista, pin);
  if(!pinOk){
    setErro("at-pin-erro","PIN incorreto ou motorista não cadastrado/aprovado.");
    document.getElementById('at-btn').disabled=false;
    document.getElementById('at-btn').innerHTML='🔑 Registrar entrega';
    return;
  }
  document.getElementById('at-btn').innerHTML='<span class="spinner"></span> Salvando...';

  const atendimento = {
    id: uid(), motorista, veiculo, dataEntrega, kmInicial,
    dataDevolucao: null, kmFinal: null, kmRodado: null,
    obs,
    validadoPinEntrega: true,
    codigoValidacaoEntrega: gerarCodigoValidacao(),
    validadoPorEntrega: motorista,
    criadoEm: Date.now(), criadoPor: session.nome
  };

  try{
    await saveAtendimento(atendimento);
    session.role==='atendimento'?showAtendimento():showGestor('atendimento');
  }catch(e){
    setErro("at-erro","Erro ao salvar: "+e.message);
    document.getElementById('at-btn').disabled=false;
    document.getElementById('at-btn').innerHTML='🔑 Registrar entrega';
  }
}

function iniciarSigDev(){
  sigDevCanvas = document.getElementById('sig-dev');
  if(!sigDevCanvas) return;
  sigDevCanvas.width = sigDevCanvas.offsetWidth * window.devicePixelRatio;
  sigDevCanvas.height = sigDevCanvas.offsetHeight * window.devicePixelRatio;
  sigDevCtx = sigDevCanvas.getContext('2d');
  sigDevCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  sigDevCtx.strokeStyle='#1a1a2e'; sigDevCtx.lineWidth=2.5; sigDevCtx.lineCap='round';
  function getPos(e){ const r=sigDevCanvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:(s.clientX-r.left),y:(s.clientY-r.top)}; }
  sigDevCanvas.addEventListener('mousedown',e=>{sigDevDesenhando=true;const p=getPos(e);sigDevCtx.beginPath();sigDevCtx.moveTo(p.x,p.y);});
  sigDevCanvas.addEventListener('mousemove',e=>{if(!sigDevDesenhando)return;const p=getPos(e);sigDevCtx.lineTo(p.x,p.y);sigDevCtx.stroke();});
  sigDevCanvas.addEventListener('mouseup',()=>sigDevDesenhando=false);
  sigDevCanvas.addEventListener('touchstart',e=>{e.preventDefault();sigDevDesenhando=true;const p=getPos(e);sigDevCtx.beginPath();sigDevCtx.moveTo(p.x,p.y);},{passive:false});
  sigDevCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!sigDevDesenhando)return;const p=getPos(e);sigDevCtx.lineTo(p.x,p.y);sigDevCtx.stroke();},{passive:false});
  sigDevCanvas.addEventListener('touchend',()=>sigDevDesenhando=false);
}
function limparSigDev(){ if(sigDevCtx&&sigDevCanvas) sigDevCtx.clearRect(0,0,sigDevCanvas.width,sigDevCanvas.height); }
function getSigDev(){ if(!sigDevCanvas) return null; const b=document.createElement('canvas'); b.width=sigDevCanvas.width; b.height=sigDevCanvas.height; return sigDevCanvas.toDataURL()===b.toDataURL()?null:sigDevCanvas.toDataURL(); }

async function registrarDevolucao(id, kmInicial, motoristaNome){
  const dataDevolucao = document.getElementById('at-dev-data')?.value;
  const kmFinal = document.getElementById('at-dev-km')?.value;
  const obsDev = document.getElementById('at-dev-obs')?.value?.trim();
  if(!dataDevolucao||!kmFinal){ setErro("at-dev-erro","Preencha data e KM final."); return; }

  const pin = document.getElementById('at-dev-pin')?.value?.trim();
  if(!pin||pin.length<4){ setErro("at-dev-pin-erro","O motorista deve digitar o PIN para confirmar."); return; }

  const kmRodado = kmFinal&&kmInicial ? parseFloat(kmFinal)-parseFloat(kmInicial) : null;
  document.getElementById('at-dev-btn').disabled=true;
  document.getElementById('at-dev-btn').innerHTML='<span class="spinner"></span> Validando...';

  const pinOk = await verificarPinMotorista(motoristaNome, pin);
  if(!pinOk){
    setErro("at-dev-pin-erro","PIN incorreto ou motorista não encontrado.");
    document.getElementById('at-dev-btn').disabled=false;
    document.getElementById('at-dev-btn').innerHTML='✅ Confirmar devolução';
    return;
  }
  document.getElementById('at-dev-btn').innerHTML='<span class="spinner"></span>';

  try{
    await updateAtendimento(id,{
      dataDevolucao, kmFinal, kmRodado, obsDev,
      validadoPinDevolucao: true,
      codigoValidacaoDevolucao: gerarCodigoValidacao(),
      validadoPorDevolucao: motoristaNome
    });
    session.role==='atendimento'?showAtendimento():showGestor('atendimento');
  }catch(e){ setErro("at-dev-erro","Erro: "+e.message); document.getElementById('at-dev-btn').disabled=false; document.getElementById('at-dev-btn').innerHTML='✅ Confirmar devolução'; }
}

function exportarPDFAtendimentos(lista){
  if(!lista||!lista.length){alert("Nenhum atendimento para exportar.");return;}

    const dur2=a.dataRetorno?dur(new Date(a.dataRetorno)-new Date(a.dataSaida)):'Em andamento';
    return `<tr><td>${new Date(a.dataSaida).toLocaleString('pt-BR')}</td><td>${a.solicitante}</td><td>${a.local}</td><td>${a.servidor||a.motorista||'—'}</td><td>${a.placa||a.veiculo||'—'}</td><td>${a.km?Number(a.km).toLocaleString('pt-BR')+' km':'—'}</td><td>${a.kmRetorno?Number(a.kmRetorno).toLocaleString('pt-BR')+' km':'—'}</td><td>${a.kmRodado&&a.kmRodado>0?Number(a.kmRodado).toLocaleString('pt-BR')+' km':'—'}</td><td>${dur2}</td><td>${a.dataRetorno?'Concluído':'Em andamento'}</td></tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><title>Relatório de Atendimentos</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:11px;padding:16px}h1{font-size:15px;border-bottom:2px solid #2E86D9;padding-bottom:8px;margin-bottom:12px}table{width:100%;border-collapse:collapse}th{background:#2E86D9;color:#1C2333;padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase}td{padding:5px 8px;border-bottom:1px solid #e0e4f0;font-size:11px}tr:nth-child(even){background:#f9f9ff}.footer{margin-top:12px;font-size:9px;color:#aaa;text-align:right}@media print{@page{margin:10mm}}</style>
  </head><body>
  <h1>🚐 Frota Conecta — Relatório de Atendimentos</h1>
  <p style="color:#7C8AAE;font-size:10px;margin-bottom:10px">Gerado em ${fmt(Date.now())} · ${lista.length} atendimento(s)</p>
  <table><thead><tr><th>Data/Hora Saída</th><th>Solicitante</th><th>Local</th><th>Servidor</th><th>Placa</th><th>KM Saída</th><th>KM Retorno</th><th>KM Rodado</th><th>Duração</th><th>Status</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div class="footer">Frota Conecta · ${fmt(Date.now())}</div>
  <script>window.onload=()=>window.print();<\/script></body></html>`;
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="relatorio-atendimentos.html";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function addEmail(){
  const nome=$("e-nome")?.value?.trim(), email=$("e-email")?.value?.trim().toLowerCase();
  setErro("e-erro","");
  if(!email){setErro("e-erro","Digite um e-mail.");return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setErro("e-erro","E-mail inválido.");return;}
  if(emails.find(e=>e.email===email)){setErro("e-erro","E-mail já cadastrado.");return;}
  emails=[...emails,{id:uid(),email,nome:nome||email,ativo:true,criadoEm:Date.now()}];
  await saveEmails(emails);
  showGestor("emails");
}
async function toggleEmail(id){
  emails=emails.map(e=>e.id===id?{...e,ativo:!e.ativo}:e);
  await saveEmails(emails); showGestor("emails");
}
async function delEmail(id){
  emails=emails.filter(e=>e.id!==id);
  await saveEmails(emails); showGestor("emails");
}

  const todos = await loadChecklistsEnviados();
  const semId = todos.filter(c=>c.tipo==='viagem-saida' && !c.viagemId);
  if(!semId.length){ alert("Nenhum checklist antigo para corrigir."); return; }
  for(const c of semId){
    try{ await api("PATCH",`/api/checklists/${c.id}`,{viagemId: uid()}); }catch(e){}
  }
  alert(`${semId.length} checklist(s) recuperado(s)! Agora devem aparecer em "Aguardando retorno".`);
  showChecklist();
}

async function iniciarChecklist(tipo, viagemIdParam){
  checklistTipo = tipo;
  checklistItems = await loadChecklistItems();
  const tipoFiltro = tipo==='mensal'?'mensal':tipo.startsWith('viagem')?'viagem':'ambos';
  const itens = checklistItems.filter(i=>(i.tipo===tipoFiltro||i.tipo==='ambos')&&i.ativo!==false);
  checklistRespostas = itens.map(i=>({itemId:i.id,item:i.item,categoria:i.categoria||'Checklist',ok:null,obs:''}));
  checklistFotosAngulos = {};
  checklistObsAngulos = {};
  fotoCNHdata = null;
  fotoAutorizacaoData = null;
  let motoristasAprovados = [];
  try{
    const todosUsers = await api("GET","/api/usuarios");
    motoristasAprovados = todosUsers.filter(u=>u.role==='motorista'&&u.aprovado!==false&&u.ativo!==false).sort((a,b)=>a.nome.localeCompare(b.nome));
  }catch(e){ /* lista vazia em caso de erro */ }
  const isViagem = tipo.startsWith('viagem');

  // Aviso se já existe uma viagem em aberto (saída sem retorno) para este motorista
  if(tipo==='viagem-saida'){
    const todosCl = await loadChecklistsEnviados();
    const meusCl = todosCl.filter(c=>c.motorista===session.nome);
    const jaAberta = meusCl.find(c=>
      c.tipo==='viagem-saida' && c.viagemId &&
      !meusCl.some(r=>r.tipo==='viagem-retorno' && r.viagemId===c.viagemId)
    );
    if(jaAberta){
      const continuar = confirm(`Você já tem uma viagem em aberto (${jaAberta.placa} — saída em ${fmt(jaAberta.criadoEm)}, sem retorno registrado).\n\nTem certeza que quer iniciar OUTRA saída sem devolver essa primeiro?`);
      if(!continuar){ showChecklist(); return; }
    }
  }

  // Se for retorno sem viagemId, mostrar seleção de viagens abertas
  if(tipo==='viagem-retorno' && !viagemIdParam){
    const todos = await loadChecklistsEnviados();
    const meusChecklists = todos.filter(c=>c.motorista===session.nome);
    const saidasAbertas = meusChecklists.filter(c=>
      c.tipo==='viagem-saida' && c.viagemId &&
      !meusChecklists.some(r=>r.tipo==='viagem-retorno' && r.viagemId===c.viagemId)
    );
    if(saidasAbertas.length===0){
      render(`
        <button class="volta-btn" onclick="showChecklist()">← Voltar</button>
        <div class="card" style="text-align:center;padding:32px;border-style:dashed">
          <p style="font-size:36px;margin-bottom:12px">🏁</p>
          <p style="color:#fff;font-weight:700;font-size:15px">Nenhuma viagem em aberto</p>
          <p style="color:#7C8AAE;font-size:13px;margin-top:6px">Faça primeiro o checklist de Saída para depois registrar o Retorno.</p>
          <button class="btn btn-primary" style="margin-top:20px" onclick="iniciarChecklist('viagem-saida')">📋 Fazer checklist de Saída</button>
        </div>
      `);
      return;
    }
    if(saidasAbertas.length===1){
      // Só uma viagem aberta — vai direto
      viagemIdParam = saidasAbertas[0].viagemId;
    } else {
      // Múltiplas viagens — pede para selecionar
      render(`
        <button class="volta-btn" onclick="showChecklist()">← Voltar</button>
        <div style="font-weight:700;font-size:15px;margin-bottom:16px">🏁 Selecione a viagem para retorno</div>
        ${saidasAbertas.map(c=>`
          <button onclick="iniciarChecklist('viagem-retorno','${c.viagemId}')"
            style="width:100%;text-align:left;background:#1C2333;border:2px solid #3D5A80;border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="color:#fff;font-weight:700;font-size:14px">${c.placa} — ${c.condutor||c.motorista}</div>
              <div style="color:#7C8AAE;font-size:12px;margin-top:2px">📍 ${c.destino||'—'}</div>
              <div style="color:#2E86D9;font-size:11px;margin-top:2px">Saída: ${fmt(c.criadoEm)}</div>
            </div>
            <span style="color:#3D5A80;font-size:18px">›</span>
          </button>`).join('')}
      `);
      return;
    }
  }

  // Se for retorno de uma viagem específica, busca os dados da saída para pré-preencher
  window._checklistViagemId = tipo==='viagem-saida' ? uid() : (viagemIdParam||null);
  let dadosSaida = null;
  if(tipo==='viagem-retorno' && viagemIdParam){
    const todos = await loadChecklistsEnviados();
    dadosSaida = todos.find(c=>c.viagemId===viagemIdParam && c.tipo==='viagem-saida');
  }
  
  render(`
    <button class="volta-btn" onclick="showChecklist()">← Voltar</button>
    <div style="margin-bottom:16px">
      <div style="font-weight:700;font-size:15px">Vistoria de ${tipo==='viagem-saida'?'Saída':tipo==='viagem-retorno'?'Retorno':'Mensal'}</div>
      <div style="color:#7C8AAE;font-size:12px">Preencha todos os campos</div>
    </div>

    <!-- Dados principais -->
    <div class="card" style="margin-bottom:12px">
      <p class="field-label" style="margin-bottom:12px">📋 Dados da Vistoria</p>
      <label class="field-label">Placa do veículo *</label>
      ${dadosSaida?`
      <input class="field-input" id="cl-placa" value="${dadosSaida.placa||''}" readonly style="opacity:.7"/>
      <input type="hidden" id="cl-modelo" value="${dadosSaida.modelo||''}"/>
      `:`
      <input id="cl-busca-placa" placeholder="🔍 Digite a placa ou modelo..."
        style="width:100%;background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:6px"
        oninput="clearTimeout(window._plTimer);window._plTimer=setTimeout(()=>buscarPlacaChecklist(this.value),300)"/>
      <div id="cl-placa-resultado"></div>
      <input type="hidden" id="cl-placa" value=""/>
      <input type="hidden" id="cl-modelo" value=""/>
      `}
      <label class="field-label" style="margin-top:8px">KM do odômetro *</label>
      <div class="km-field">
        <input class="km-input" id="cl-km" type="number" placeholder="Ex: 80520" oninput="calcularKmRodado()"/>
        <span class="km-suffix">km</span>
      </div>
      ${tipo==='viagem-retorno'?`
      <label class="field-label">KM na saída (para calcular km rodado)</label>
      <div class="km-field" style="margin-bottom:4px">
        <input class="km-input" id="cl-km-saida" type="number" placeholder="KM quando saiu" value="${dadosSaida?.km||''}" ${dadosSaida?.km?'readonly style="opacity:.7"':''} oninput="calcularKmRodado()"/>
        <span class="km-suffix">km</span>
      </div>
      <div id="km-rodado-display" style="color:#2E86D9;font-size:12px;font-weight:700;margin-bottom:12px"></div>
      `:''}

      ${isViagem?`
      <div style="border-top:1px solid #2C3550;margin:12px 0;padding-top:12px">
        <p class="field-label" style="color:#2E86D9;margin-bottom:12px">🚗 Dados da Viagem</p>
        <label class="field-label">Nome do condutor *</label>
        ${dadosSaida?`
        <input class="field-input" id="cl-condutor" value="${dadosSaida.condutor||''}" readonly style="opacity:.7"/>
        `:`
        <input id="cl-busca-condutor" placeholder="🔍 Digite o nome do condutor..."
          style="width:100%;background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:6px"
          oninput="clearTimeout(window._cTimer);window._cTimer=setTimeout(()=>buscarCondutorChecklist(this.value),300)"
          value="${session.nome||''}"/>
        <div id="cl-condutor-resultado"></div>
        <input type="hidden" id="cl-condutor" value="${session.nome||''}"/>
        `}
        <label class="field-label">Destino da viagem *</label>
        <input class="field-input" id="cl-destino" placeholder="Ex: Porto Velho - RO" value="${dadosSaida?.destino||''}" ${dadosSaida?'readonly style="opacity:.7"':''}/>

// ===== ASSINATURA DIGITAL =====
let sigCanvas = null, sigCtx = null, sigDesenhando = false;

function iniciarAssinatura(){
  sigCanvas = document.getElementById('sig-canvas');
  if(!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.strokeStyle = '#1a1a2e';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';

  function getPos(e){
    const rect = sigCanvas.getBoundingClientRect();
    const scaleX = sigCanvas.width / rect.width;
    const scaleY = sigCanvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top) * scaleY
    };
  }

  function start(e){ e.preventDefault(); sigDesenhando=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }
  function draw(e){ e.preventDefault(); if(!sigDesenhando) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); }
  function stop(e){ e.preventDefault(); sigDesenhando=false; }

  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', draw);
  sigCanvas.addEventListener('mouseup', stop);
  sigCanvas.addEventListener('touchstart', start, {passive:false});
  sigCanvas.addEventListener('touchmove', draw, {passive:false});
  sigCanvas.addEventListener('touchend', stop, {passive:false});
}

function limparAssinatura(){
  if(sigCtx && sigCanvas) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
}

function getAssinaturaBase64(){
  if(!sigCanvas) return null;
  const blank = document.createElement('canvas');
  blank.width = sigCanvas.width; blank.height = sigCanvas.height;
  if(sigCanvas.toDataURL() === blank.toDataURL()) return null;
  return sigCanvas.toDataURL('image/png');
}

function calcularKmRodado(){
  const kmAtual = parseFloat(document.getElementById('cl-km')?.value)||0;
  const kmSaida = parseFloat(document.getElementById('cl-km-saida')?.value)||0;
  const display = document.getElementById('km-rodado-display');
  if(display && kmAtual > 0 && kmSaida > 0){
    const rodado = kmAtual - kmSaida;
    display.textContent = rodado > 0 ? `🛣 KM rodado na viagem: ${rodado.toLocaleString('pt-BR')} km` : '⚠ KM atual menor que KM de saída';
    display.style.color = rodado > 0 ? '#2E86D9' : '#C0392B';
  } else if(display) {
    display.textContent = '';
  }
}

async function enviarChecklist(){
  const placa = $("cl-placa")?.value?.trim().toUpperCase();
  const modelo = $("cl-modelo")?.value?.trim();
  const km = $("cl-km")?.value;
  const obsGeral = $("cl-obs-geral")?.value?.trim();
  if(!placa){ setErro("cl-erro","Informe a placa."); return; }
  if(!km){ setErro("cl-erro","Informe o KM do odômetro."); return; }
  if(checklistTipo.startsWith('viagem')){
    if(!$("cl-condutor")?.value?.trim()){ setErro("cl-erro","Informe o nome do condutor."); return; }
    if(!$("cl-destino")?.value?.trim()){ setErro("cl-erro","Informe o destino da viagem."); return; }
  }
  const kmSaidaVal = $("cl-km-saida")?.value;
  if(kmSaidaVal && Number(km) < Number(kmSaidaVal)){
    setErro("cl-erro",`O KM do retorno (${Number(km).toLocaleString('pt-BR')}) não pode ser menor que o KM da saída (${Number(kmSaidaVal).toLocaleString('pt-BR')}).`);
    return;
  }
  const naoRespondidos = checklistRespostas.filter(r=>r.ok===null);
  if(naoRespondidos.length>0){ setErro("cl-erro",`Responda todos os itens. Faltam ${naoRespondidos.length}.`); return; }

  const pin = $("cl-pin")?.value?.trim();
  if(!pin||pin.length<4){ setErro("cl-pin-erro","Digite seu PIN para validar o documento."); return; }

  $("cl-btn").disabled=true; $("cl-btn").innerHTML='<span class="spinner"></span> Validando...';
  const pinOk = await verificarPinUsuario(pin);
  if(!pinOk){
    setErro("cl-pin-erro","PIN incorreto. Tente novamente.");
    $("cl-btn").disabled=false; $("cl-btn").innerHTML='✅ Finalizar e gerar PDF';
    return;
  }
  $("cl-btn").innerHTML='<span class="spinner"></span> Salvando...';
  
  const temNOK = checklistRespostas.some(r=>r.ok===false);
  const isViagem = checklistTipo.startsWith('viagem');
  const condutor = $("cl-condutor")?.value?.trim()||'';
  const destino = $("cl-destino")?.value?.trim()||'';
  const dtSaida = $("cl-dt-saida")?.value||'';
  const dtRetornoPrev = $("cl-dt-retorno-prev")?.value||'';
  const dtRetorno = $("cl-dt-retorno")?.value||'';
  const codigoValidacao = gerarCodigoValidacao();

  const checklist = {
    id: uid(), motorista: session.nome, placa, modelo: modelo||'',
    km, 
    viagemId: window._checklistViagemId||null,
    kmSaida: $('cl-km-saida')?.value||null,
    kmRodado: ($('cl-km')?.value && $('cl-km-saida')?.value) ? (parseFloat($('cl-km').value) - parseFloat($('cl-km-saida').value)) : null,
    obsGeral: obsGeral||'',
    tipo: checklistTipo, criadoEm: Date.now(),
    // Dados de viagem
    condutor: isViagem?condutor:'',
    destino: isViagem?destino:'',
    dtSaida: dtSaida||'',
    dtRetornoPrev: dtRetornoPrev||'',
    dtRetorno: dtRetorno||'',
    fotoCNH: isViagem?fotoCNHdata:null,
    fotoAutorizacao: checklistTipo==='viagem-saida'?fotoAutorizacaoData:null,
    assinatura: null,
    validadoPin: true,
    codigoValidacao,
    itens: checklistRespostas,
    fotosAngulos: checklistFotosAngulos,
    obsAngulos: {...checklistObsAngulos},
    temNOK
  };
  
  try{
    await saveChecklistEnviado(checklist);
    const pdfUrl = gerarPDFChecklist(checklist);
    showSucessoChecklist(checklist, pdfUrl);
  }catch(e){
    setErro("cl-erro","Erro ao salvar: "+e.message);
    $("cl-btn").disabled=false; $("cl-btn").innerHTML='✅ Finalizar e gerar PDF';
  }
}

  render(`

      <h3 style="font-size:18px;font-weight:800">${cl.temNOK?'Checklist com pendências':'Checklist OK!'}</h3>

      ${nok.map(i=>`<div style="color:#FFB0A0;font-size:13px;padding:4px 0;border-bottom:1px solid #C0392B22">• ${i.item}${i.obs?` — ${i.obs}`:''}</div>`).join("")}
    </div>`:''}
    ${pdfUrl?`<a href="${pdfUrl}" target="_blank" rel="noopener"

      📄 Abrir / Imprimir PDF
    </a>`:''}

  `);
}

async function gerarRelatorioChecklist(tipoRel){
  const mot = document.getElementById('cl-filtro-mot')?.value||'';
  const dataIni = document.getElementById('cl-filtro-ini')?.value||'';
  const dataFim = document.getElementById('cl-filtro-fim')?.value||'';

  const todos = await loadChecklistsEnviados();
  let filtrados = [...todos];

  // Filtrar por tipo de relatório
  if(tipoRel==='viagem') filtrados = filtrados.filter(c=>c.tipo==='viagem-saida'||c.tipo==='viagem-retorno');
  if(tipoRel==='mensal') filtrados = filtrados.filter(c=>c.tipo==='mensal');
  if(mot) filtrados = filtrados.filter(c=>c.motorista===mot);
  if(dataIni) filtrados = filtrados.filter(c=>c.criadoEm>=new Date(dataIni).getTime());
  if(dataFim) filtrados = filtrados.filter(c=>c.criadoEm<=new Date(dataFim).getTime()+86399999);
  filtrados.sort((a,b)=>b.criadoEm-a.criadoEm);

  if(!filtrados.length){ alert('Nenhum checklist encontrado para esse período.'); return; }

  // Para viagens: agrupar saída+retorno por viagemId
  let blocos = '';
  if(tipoRel==='viagem'){
    const viagensIds = [...new Set(filtrados.filter(c=>c.viagemId).map(c=>c.viagemId))];
    const semId = filtrados.filter(c=>!c.viagemId);

    const processarChecklist = (c, titulo) => {
      const okCount = c.itens?.filter(i=>i.ok).length||0;
      const nokCount = c.itens?.filter(i=>!i.ok).length||0;
      const noks = c.itens?.filter(i=>!i.ok)||[];
      const temFotos = Object.keys(c.fotosAngulos||{}).length;
      return `
      <div style="background:#f9faff;border:1px solid #e0e4f0;border-radius:6px;padding:10px;margin-bottom:8px">
        <div style="font-size:10px;text-transform:uppercase;color:${c.tipo==='viagem-saida'?'#16A34A':'#3B82F6'};font-weight:700;margin-bottom:6px">${titulo}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;font-size:10px">
          <div><span style="color:#7C8AAE">Data:</span> ${fmt(c.criadoEm)}</div>
          <div><span style="color:#7C8AAE">KM:</span> ${c.km?Number(c.km).toLocaleString('pt-BR')+' km':'—'}</div>
          ${c.dtSaida?`<div><span style="color:#7C8AAE">Saída:</span> ${new Date(c.dtSaida).toLocaleString('pt-BR')}</div>`:''}
          ${c.dtRetorno?`<div><span style="color:#7C8AAE">Retorno:</span> ${new Date(c.dtRetorno).toLocaleString('pt-BR')}</div>`:''}
          ${c.kmRodado>0?`<div style="grid-column:span 2"><span style="color:#7C8AAE">KM rodado:</span> <strong>${Number(c.kmRodado).toLocaleString('pt-BR')} km</strong></div>`:''}
        </div>
        <div style="font-size:10px;margin-bottom:4px">
          <span style="color:#7C8AAE">Itens: </span><span style="color:#16A34A;font-weight:700">${okCount} OK</span>
          ${nokCount>0?`<span style="color:#C0392B;font-weight:700;margin-left:8px">⚠ ${nokCount} pendência(s)</span>`:''}
          ${temFotos>0?`<span style="color:#7C8AAE;margin-left:8px">📷 ${temFotos} fotos</span>`:''}
          ${c.fotoCNH?`<span style="color:#7C8AAE;margin-left:8px">📄 CNH</span>`:''}
          ${c.fotoAutorizacao?`<span style="color:#7C8AAE;margin-left:8px">🧾 Autorização</span>`:''}
          ${c.validadoPin?`<span style="color:#16A34A;margin-left:8px;font-weight:700">🔐 Validado · ${c.codigoValidacao||''}</span>`:''}
        </div>
        ${nokCount>0?`<div style="background:#fff0f0;border-radius:4px;padding:6px;font-size:10px">
          ${noks.map(i=>`<div style="color:#C0392B">• ${i.item}${i.obs?': '+i.obs:''}</div>`).join('')}
        </div>`:''}
        ${c.obsGeral?`<div style="font-size:10px;color:#555;margin-top:4px;font-style:italic">Obs: ${c.obsGeral}</div>`:''}
      </div>`;
    };

    // Viagens com viagemId (saída+retorno vinculados)
    viagensIds.forEach(vid=>{
      const saida = filtrados.find(c=>c.viagemId===vid&&c.tipo==='viagem-saida');
      const retorno = filtrados.find(c=>c.viagemId===vid&&c.tipo==='viagem-retorno');
      const ref = saida||retorno;
      if(!ref) return;
      const kmTotal = saida&&retorno&&retorno.km&&saida.km?(parseFloat(retorno.km)-parseFloat(saida.km)):null;
      blocos += `
      <div style="border:1px solid #e0e4f0;border-radius:8px;padding:12px;margin-bottom:16px;page-break-inside:avoid">
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2E86D9;padding-bottom:8px;margin-bottom:10px">
          <div>
            <span style="font-family:monospace;font-weight:800;font-size:14px">${ref.placa}</span>
            <span style="color:#555;font-size:12px;margin-left:8px">${ref.modelo||''}</span>
          </div>
          <div style="text-align:right;font-size:11px;color:#555">
            <div>Condutor: <strong>${ref.condutor||ref.motorista}</strong></div>
            <div>Destino: ${ref.destino||'—'}</div>
            ${kmTotal!==null?`<div style="color:#D97706;font-weight:700">📏 ${Number(kmTotal).toLocaleString('pt-BR')} km rodados</div>`:''}
          </div>
        </div>
        ${saida?processarChecklist(saida,'🚀 Vistoria de Saída'):'<div style="background:#fff8e6;border-radius:6px;padding:8px;font-size:10px;color:#D97706;margin-bottom:8px">⏳ Vistoria de saída não encontrada</div>'}
        ${retorno?processarChecklist(retorno,'🏁 Vistoria de Retorno'):'<div style="background:#f0f7ff;border-radius:6px;padding:8px;font-size:10px;color:#3B82F6;margin-bottom:8px">⏳ Aguardando retorno</div>'}
      </div>`;
    });

    // Checklists sem viagemId
    semId.forEach(c=>{
      const tipoLabel = c.tipo==='viagem-saida'?'🚀 Saída Avulsa':'🏁 Retorno Avulso';
      blocos += `<div style="border:1px solid #e0e4f0;border-radius:8px;padding:12px;margin-bottom:16px">
        <div style="border-bottom:2px solid #2E86D9;padding-bottom:8px;margin-bottom:10px">
          <span style="font-family:monospace;font-weight:800">${c.placa}</span>
          <span style="color:#555;font-size:12px;margin-left:8px">${c.modelo||''}</span>
          <span style="float:right;font-size:11px;color:#555">Condutor: ${c.condutor||c.motorista}</span>
        </div>
        ${processarChecklist(c, tipoLabel)}
      </div>`;
    });

  } else {
    // Relatório Mensal
    filtrados.forEach(c=>{
      const okCount = c.itens?.filter(i=>i.ok).length||0;
      const nokCount = c.itens?.filter(i=>!i.ok).length||0;
      const noks = c.itens?.filter(i=>!i.ok)||[];
      const temFotos = Object.keys(c.fotosAngulos||{}).length;
      blocos += `
      <div style="border:1px solid #e0e4f0;border-radius:8px;padding:12px;margin-bottom:16px;page-break-inside:avoid">
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2E86D9;padding-bottom:8px;margin-bottom:10px">
          <div>
            <span style="font-family:monospace;font-weight:800;font-size:14px">${c.placa}</span>
            <span style="color:#555;font-size:12px;margin-left:8px">${c.modelo||''}</span>
          </div>
          <div style="text-align:right;font-size:11px;color:#555">
            <div>Motorista: <strong>${c.motorista}</strong></div>
            <div>${fmt(c.criadoEm)}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;font-size:10px">
          <div style="background:#f5f7ff;border-radius:4px;padding:6px;text-align:center">
            <div style="font-size:16px;font-weight:800;color:#16A34A">${okCount}</div><div style="color:#7C8AAE">Itens OK</div>
          </div>
          <div style="background:#fff0f0;border-radius:4px;padding:6px;text-align:center">
            <div style="font-size:16px;font-weight:800;color:#C0392B">${nokCount}</div><div style="color:#7C8AAE">Pendências</div>
          </div>
          <div style="background:#f5f7ff;border-radius:4px;padding:6px;text-align:center">
            <div style="font-size:16px;font-weight:800;color:#3B82F6">${temFotos}</div><div style="color:#7C8AAE">Fotos</div>
          </div>
        </div>
        ${c.km?`<div style="font-size:10px;color:#555;margin-bottom:6px">KM: <strong>${Number(c.km).toLocaleString('pt-BR')} km</strong></div>`:''}
        ${nokCount>0?`
        <div style="background:#fff0f0;border:1px solid #fecaca;border-radius:4px;padding:8px;margin-bottom:6px;font-size:10px">
          <div style="font-weight:700;color:#C0392B;margin-bottom:4px">⚠ Itens com pendência:</div>
          ${noks.map(i=>`<div style="color:#C0392B">• ${i.item}${i.obs?': '+i.obs:''}</div>`).join('')}
        </div>`:''}
        ${c.obsGeral?`<div style="font-size:10px;color:#555;font-style:italic">Obs: ${c.obsGeral}</div>`:''}
        ${c.validadoPin?`<div style="font-size:10px;color:#16A34A;font-weight:700;margin-top:4px">🔐 Validado · Código: ${c.codigoValidacao||'—'}</div>`:''}
      </div>`;
    });
  }

  const titulo = tipoRel==='viagem'?'Relatório de Checklists de Viagem':'Relatório de Vistorias Periódicas (Mensal)';
  const periodo = dataIni||dataFim ? `${dataIni?new Date(dataIni).toLocaleDateString('pt-BR'):'início'} a ${dataFim?new Date(dataFim).toLocaleDateString('pt-BR'):'hoje'}` : 'Todos os períodos';

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
  <title>${titulo}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;font-size:11px;padding:18px}
  .header{border-bottom:3px solid #2E86D9;padding-bottom:10px;margin-bottom:16px}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .kpi{background:#f5f7ff;border-radius:6px;padding:8px;text-align:center}
  .kpi .v{font-size:20px;font-weight:800;color:#1a1a2e}
  .kpi .l{font-size:9px;color:#7C8AAE;margin-top:2px}
  .footer{margin-top:14px;font-size:9px;color:#aaa;text-align:right}
  @media print{body{padding:10px}@page{margin:8mm;size:A4}}</style>
  </head><body>
  <div class="header">
    <div style="font-size:16px;font-weight:800">🚛 Frota Conecta — ALERO</div>
    <div style="font-size:12px;color:#7C8AAE;margin-top:2px">${titulo}</div>
    <div style="font-size:10px;color:#7C8AAE;margin-top:2px">Período: ${periodo}${mot?' · Motorista: '+mot:''}</div>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="v">${filtrados.length}</div><div class="l">Total de registros</div></div>
    <div class="kpi"><div class="v" style="color:#16A34A">${filtrados.filter(c=>!c.temNOK).length}</div><div class="l">Sem pendências</div></div>
    <div class="kpi"><div class="v" style="color:#C0392B">${filtrados.filter(c=>c.temNOK).length}</div><div class="l">Com pendências</div></div>
  </div>
  ${blocos}
  <div class="footer">Frota Conecta · Gerado em ${fmt(Date.now())}</div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function abrirPDFChecklistGestor(id){
  const todos = await loadChecklistsEnviados();
  const cl = todos.find(c=>c.id===id);
  if(!cl) return;
  const url = gerarPDFChecklist(cl);
  const a = document.createElement('a'); a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

let clTipoSel = 'ambos';
function selectTipoChecklist(t){
  clTipoSel=t;
  ['saida','retorno','ambos'].forEach(x=>{
    const btn=$(`cl-tipo-${x}`);
    if(btn){
      const active=x===t;
      btn.style.borderColor=active?'#2E86D9':'#2C3550';
      btn.style.background=active?'#2E86D922':'transparent';
      btn.style.color=active?'#2E86D9':'#7C8AAE';
    }
  });
}

async function adicionarItemChecklist(){
  const item=$("cl-novo-item")?.value?.trim();
  const cat=$("cl-nova-cat")?.value?.trim()||'Geral';
  if(!item){alert("Digite o nome do item.");return;}
  const items=await loadChecklistItems();
  items.push({id:uid(),item,categoria:cat,tipo:clTipoSel,ativo:true,criadoEm:Date.now()});
  await saveChecklistItems(items);
  await showGestor('checklist');
}

async function atualizarFiltrosChecklist(){
  checklistGestorLimite = 20;
  await rerenderGestorChecklistComFiltros();
}

async function carregarMaisChecklistsGestor(){
  checklistGestorLimite += 20;
  await rerenderGestorChecklistComFiltros();
}

async function rerenderGestorChecklistComFiltros(){
  const mot = document.getElementById('cl-filtro-mot')?.value||'';
  const tipo = document.getElementById('cl-filtro-tipo')?.value||'';
  const ini = document.getElementById('cl-filtro-ini')?.value||'';
  const fim = document.getElementById('cl-filtro-fim')?.value||'';
  const html = await renderGestorChecklist(mot, tipo, ini, fim);
  const cont = document.getElementById('aba-conteudo');
  if(cont) cont.innerHTML = html;
}

async function toggleItemChecklist(id){
  const items=await loadChecklistItems();
  const idx=items.findIndex(i=>i.id===id);
  if(idx>=0){ items[idx].ativo=!items[idx].ativo; await saveChecklistItems(items); await showGestor('checklist'); }
}

async function deletarItemChecklist(id){
  if(!confirm("Remover este item?")) return;
  const items=(await loadChecklistItems()).filter(i=>i.id!==id);
  await saveChecklistItems(items); await showGestor('checklist');
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  deferredPrompt = null;
});

async function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      document.getElementById('install-banner').style.display = 'none';
    }
    deferredPrompt = null;
  } else {
    alert('Para instalar:\n\n1. Toque nos 3 pontinhos ⋮\n2. Toque em "Adicionar à tela inicial"\n\nOu use o Samsung Internet para instalar mais facilmente.');
  }
}

async function init(){
  ping();
  pingInterval=setInterval(ping,10*60*1000);
  // Sempre mostra a tela de escolha de perfil ao abrir o app
  session = null;
  document.getElementById('header-logo-img').src = LOGO_ALERO;
  showLogin();
}

init();

// Desregistrar service workers antigos
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}
</script>
