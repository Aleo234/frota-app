<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Frota Conecta</title>

<meta name="theme-color" content="#2E86D9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Frota Conecta"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#10141F;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
input,textarea,button,select{font-family:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 14px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:#194C7D;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:cover}
.logo-text h1{color:#fff;font-size:16px;font-weight:800}
.logo-text p{color:#7C8AAE;font-size:11px}
.header-right{display:flex;align-items:center;gap:8px}
.status-dot{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.btn-sair{background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:6px 12px;color:#7C8AAE;cursor:pointer;font-size:12px}
.main{padding:0 20px 40px;flex:1}
.card{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{width:100%;border-radius:12px;padding:14px;font-weight:700;font-size:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#2E86D9;color:#1C2333}
.btn-secondary{background:#3D5A80;color:#fff}
.btn-ghost{background:transparent;color:#7C8AAE;border:1px solid #2C3550}
.btn-sm{width:auto;padding:6px 14px;font-size:13px;border-radius:8px}
.tabs{display:flex;background:#1C2333;border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all .2s}
.tab.active-amber{background:#2E86D9;color:#1C2333}
.tab.active-blue{background:#3D5A80;color:#fff}
.tab.inactive{background:transparent;color:#7C8AAE}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7C8AAE;display:block;margin-bottom:6px}
.field-input{width:100%;background:transparent;border:none;border-bottom:2px solid #3D5A80;padding-bottom:6px;color:#fff;font-size:16px;outline:none;margin-bottom:16px}
.field-input::placeholder{color:#3D5A80}
.field-textarea{width:100%;background:transparent;border:2px solid #2C3550;border-radius:8px;padding:10px;color:#fff;font-size:13px;outline:none;resize:none;margin-bottom:16px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.tipo-btn{background:#1C2333;border:1px solid #2C3550;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;font-weight:600;text-align:left;color:#C8D2EC;transition:all .2s}
.tipo-btn.active{background:#2E86D9;color:#1C2333;border-color:#2E86D9}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.foto-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:4px;right:4px;background:#C0392B;border:none;border-radius:50%;width:22px;height:22px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.foto-num{position:absolute;bottom:0;left:0;right:0;background:#00000088;color:#fff;text-align:center;font-size:10px;padding:2px}
.foto-add{background:#1C2333;border:1px dashed #3D5A80;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;aspect-ratio:1;font-size:22px}
.foto-add span{font-size:10px;color:#5C6889;margin-top:4px}
.foto-btn-vazio{display:flex;align-items:center;justify-content:center;gap:8px;background:#1C2333;border:1px dashed #3D5A80;border-radius:10px;padding:12px;cursor:pointer;color:#9DB0D6;font-size:13px;margin-bottom:16px;width:100%}
.bo-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#2A1F12;border:1px dashed #1F5C8C;border-radius:10px;padding:12px;cursor:pointer;color:#8FC1EA;font-size:13px;margin-bottom:16px;width:100%}
.erro{background:#C0392B22;border:1px solid #C0392B55;color:#FF9B8A;border-radius:8px;padding:10px 14px;font-size:13px;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.success{background:#2E7D3222;border:1px solid #2E7D3255;color:#81C784;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.kpi{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:14px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7C8AAE;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#fff}
.filtros{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.filtro-btn{flex-shrink:0;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #2C3550;background:transparent;color:#7C8AAE;transition:all .2s}
.filtro-btn.active{background:#2E86D9;color:#1C2333;border-color:#2E86D9}
.sol-item{background:#1C2333;border:1px solid #2C3550;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;width:100%;text-align:left}
.sol-title{color:#fff;font-weight:600;font-size:14px}
.sol-sub{color:#7C8AAE;font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.hist-item{display:flex;align-items:flex-start;gap:12px;position:relative;padding-bottom:14px}
.hist-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:2px;z-index:1}
.hist-line{position:absolute;left:6px;top:16px;width:2px;height:100%;background:#2C3550}
.hist-label{color:#fff;font-size:13px;font-weight:600}
.hist-date{color:#7C8AAE;font-size:11px}
.status-btns{display:flex;flex-wrap:wrap;gap:8px}
.status-btn{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.data-item label{color:#7C8AAE;font-size:11px;display:block}
.data-item p{color:#fff;font-size:12px;font-family:monospace;margin-top:2px}
.placa-sub-box{background:#2E86D911;border:1px solid #2E86D944;border-radius:8px;padding:10px;grid-column:1/-1;margin-top:4px}
.volta-btn{background:none;border:none;color:#7C8AAE;cursor:pointer;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.email-item{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.email-nome{color:#fff;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-addr{color:#7C8AAE;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-status{font-size:10px;margin-top:2px}
.toggle-btn{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid}
.del-btn{width:32px;height:32px;border-radius:8px;background:#C0392B22;border:none;color:#C0392B;cursor:pointer;font-size:16px;flex-shrink:0}
.pdf-container{display:flex;flex-direction:column;gap:12px}
.pdf-header{display:flex;justify-content:space-between;align-items:center}
iframe{width:100%;height:70vh;border-radius:12px;border:1px solid #2C3550}
.hidden{display:none!important}
.sig-canvas{border:2px solid #3D5A80;border-radius:8px;background:#fff;touch-action:none;cursor:crosshair;width:100%;height:120px}
.sig-box{margin-bottom:12px}
.urgencia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.urgencia-btn{border-radius:10px;padding:10px 8px;cursor:pointer;font-size:13px;font-weight:700;text-align:center;border:2px solid transparent;transition:all .2s}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#C0392B;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.status-changed{animation:pulse-green 1s ease-in-out}
@keyframes pulse-green{0%,100%{background:#1C2333}50%{background:#2E7D3222}}
.km-field{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.km-input{flex:1;background:transparent;border:none;border-bottom:2px solid #3D5A80;padding-bottom:6px;color:#fff;font-size:16px;outline:none}
.km-suffix{color:#7C8AAE;font-size:13px;white-space:nowrap}
.urgencia-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700}
.cancel-btn{background:#C0392B22;border:1px solid #C0392B55;color:#FF9B8A;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;width:100%;margin-top:8px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success-icon{width:64px;height:64px;background:#2E7D3222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.text-center{text-align:center}
.mb-4{margin-bottom:16px}
.mt-2{margin-top:8px}
.choice-card{background:#1C2333;border:1px solid #2C3550;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;width:100%;text-align:left;margin-bottom:12px;transition:border-color .2s}
.choice-card:hover{border-color:#2E86D9}
.choice-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.choice-title{color:#fff;font-weight:700;font-size:14px}
.choice-sub{color:#7C8AAE;font-size:12px;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-box"><img src="" id="header-logo-img" alt="ALE/RO"/></div>
      <div class="logo-text">
        <h1>Frota Conecta</h1>
        <p id="header-sub">Solicitação de manutenção</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot" id="status-dot">
        <span class="dot" id="status-dot-color" style="background:#1F5C8C"></span>
        <span id="status-label" style="color:#1F5C8C">Conectando...</span>
      </div>
      <button class="btn-sair hidden" id="btn-sair" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="install-banner" style="display:none;background:#2E86D9;padding:10px 20px;text-align:center">
    <button onclick="instalarApp()" style="background:#1C2333;color:#2E86D9;border:none;border-radius:8px;padding:8px 20px;font-weight:700;font-size:14px;cursor:pointer">
      📲 Instalar app na tela inicial
    </button>
  </div>
  <div class="main" id="main"></div>
</div>

// API
async function api(method, path, body){
  const headers = {"Content-Type":"application/json"};
  if(sessionToken) headers["Authorization"] = "Bearer "+sessionToken;
  const res = await fetch(BACKEND+path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
    signal: AbortSignal.timeout(60000)
  });
  if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error||`Erro ${res.status}`); }
  return res.json();
}

  return Array.from(crypto.getRandomValues(new Uint8Array(4))).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();

}

// Compressor de imagem
function compressImage(file){ return new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const s=Math.min(1,700/img.width);
      const c=document.createElement("canvas");
      c.width=img.width*s; c.height=img.height*s;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",.6));
    };
    img.onerror=rej; img.src=e.target.result;
  };
  r.onerror=rej; r.readAsDataURL(file);
});}
function fileToDataUrl(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); }); }

async function entrarAtend(){
  const nome=$("a-nome")?.value?.trim(), pin=$("a-pin")?.value?.trim();
  if(!nome||pin?.length<4){setErro("a-erro","Preencha nome e PIN.");return;}
  $("a-btn").disabled=true; $("a-btn").innerHTML='<span class="spinner"></span>';
  try{
    const user=await loginApi({role:"atendimento",nome,pin});
    if(user.aprovado===false){ setErro("a-erro","⏳ Seu cadastro ainda está aguardando aprovação do gestor."); return; }
    sessionToken = user.token;
    session=user;
    showAtendimento();
  }catch(e){ setErro("a-erro",e.message||"Nome ou PIN incorretos."); }
  finally{ if($("a-btn")){ $("a-btn").disabled=false; $("a-btn").innerHTML='🔑 Entrar'; } }
}

async function cadastrarAtend(){
  const nome=$("a-nome")?.value?.trim(), pin=$("a-pin")?.value?.trim(),
        pin2=$("a-pin2")?.value?.trim(), codigo=$("a-codigo")?.value?.trim();
  if(!nome||pin?.length<4){setErro("a-erro","Preencha nome e PIN.");return;}
  if(pin!==pin2){setErro("a-erro","PINs não coincidem.");return;}
  if(codigo.toUpperCase()!=="FC2024"){setErro("a-erro","Código de acesso inválido.");return;}
  $("a-btn").disabled=true; $("a-btn").innerHTML='<span class="spinner"></span>';
  try{
    const user={id:uid(),role:"atendimento",nome:nome.trim(),pin,codigo,aprovado:false,criadoEm:Date.now()};
    await saveUser(user);
    showAguardandoAprovacao(nome);
  }catch(e){ setErro("a-erro",e.message||"Erro ao cadastrar."); }
  finally{ if($("a-btn")){ $("a-btn").disabled=false; $("a-btn").innerHTML='✅ Criar conta e entrar'; } }
}

async function cadastrarGestor(){

        senha2=$("g-senha2")?.value?.trim(), codigo=$("g-codigo")?.value?.trim();

  if(codigo.toUpperCase()!=="FC2024"){setErro("g-erro","Código de administrador inválido.");return;}
  $("g-btn").disabled=true; $("g-btn").innerHTML='<span class="spinner"></span>';
  try{
    const user={id:uid(),role:"gestor",nome:usuario,usuario,pin:senha,codigo,criadoEm:Date.now()};
    const criado = await saveUser(user);
    sessionToken = criado.token;
    session={id:user.id,role:"gestor",nome:usuario,usuario};
    showGestor();
  }catch(e){ setErro("g-erro",e.message||"Erro ao cadastrar."); }
  finally{ if($("g-btn")){ $("g-btn").disabled=false; $("g-btn").innerHTML='✅ Criar conta'; } }
}

async function salvarTrocarPinMotorista(){
  const pinAtual = document.getElementById('tp-atual')?.value?.trim();
  const pinNovo = document.getElementById('tp-novo')?.value?.trim();
  const pinConfirma = document.getElementById('tp-confirma')?.value?.trim();

  if(!pinAtual||!pinNovo||!pinConfirma){ setErro('tp-erro','Preencha todos os campos.'); return; }
  if(pinNovo.length<4){ setErro('tp-erro','O novo PIN deve ter pelo menos 4 dígitos.'); return; }
  if(pinNovo!==pinConfirma){ setErro('tp-erro','Os PINs novos não coincidem.'); return; }
  if(pinNovo===pinAtual){ setErro('tp-erro','O novo PIN deve ser diferente do atual.'); return; }

  const btn = document.getElementById('tp-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';

  }

        const mudou=r._statusAnterior&&r._statusAnterior!==r.status;
        return `<div class="card ${mudou?'status-changed':''}" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="min-width:0">
              <div class="sol-title">${TIPOS.find(t=>t.id===r.tipo)?.l||r.tipo} — ${r.placa}</div>
              <div style="color:#7C8AAE;font-size:12px;margin-top:2px">${fmt(r.criadoEm)}</div>
              ${r.km?`<div style="color:#7C8AAE;font-size:11px;margin-top:2px">🛣 ${Number(r.km).toLocaleString('pt-BR')} km</div>`:''}
              ${urg?`<span class="urgencia-tag" style="background:${urg.c}22;color:${urg.c};margin-top:4px;display:inline-flex">${urg.icon} ${urg.l}</span>`:''}

            </div>

            <p style="color:#7C8AAE;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Histórico</p>
            ${r.historico.map(h=>{const s=STATUS[h.status]||{l:h.status,c:'#888'};return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:6px;height:6px;border-radius:50%;background:${s.c};flex-shrink:0"></span><span style="color:#fff;font-size:12px">${s.l}</span><span style="color:#5C6889;font-size:11px;margin-left:auto">${fmt(h.em)}</span></div>`;}).join('')}

function filtrarSolicitacoesMotorista(busca){
  const mostrarConcluidas = document.getElementById('sol-mostrar-concluidas')?.checked;
  const minhas = records.filter(r=>r.motorista?.trim().toLowerCase()===session.nome?.trim().toLowerCase());
  let filtrado = mostrarConcluidas ? minhas : minhas.filter(r=>r.status!=='concluido');
  if(busca?.trim()){
    const termo = busca.trim().toLowerCase();
    filtrado = filtrado.filter(r=>
      r.placa?.toLowerCase().includes(termo) ||
      TIPOS.find(t=>t.id===r.tipo)?.l?.toLowerCase().includes(termo) ||
      fmt(r.criadoEm)?.toLowerCase().includes(termo)
    );
    // Se buscar, mostra concluídas também já que é busca explícita
    if(!mostrarConcluidas){
      const concluidasMatch = minhas.filter(r=>r.status==='concluido' &&
        (r.placa?.toLowerCase().includes(termo) ||
         TIPOS.find(t=>t.id===r.tipo)?.l?.toLowerCase().includes(termo) ||
         fmt(r.criadoEm)?.toLowerCase().includes(termo))
      );
      filtrado = [...filtrado, ...concluidasMatch];
    }
  }
  const lista = document.getElementById('sol-lista-motorista');
  if(lista) lista.innerHTML = renderListaSolicitacoesMotorista(filtrado);
}

async function buscarPlacaManutencao(termo){
  const div = document.getElementById('m-placa-resultado');
  if(!div) return;
  if(!termo?.trim()){
    div.innerHTML='';
    document.getElementById('f-placa').value='';
    return;
  }
  let veiculos=[];
  try{ veiculos = await loadVeiculos(); }catch(e){ veiculos=[]; }
  const t = termo.trim().toLowerCase();
  const encontrados = veiculos.filter(v=>
    v.placa?.toLowerCase().includes(t)||v.modelo?.toLowerCase().includes(t)
  );
  if(!encontrados.length){
    div.innerHTML='<p style="color:#5C6889;font-size:12px;padding:4px 0">Nenhum veículo encontrado nos cadastrados.</p>';
    return;
  }
  div.innerHTML = encontrados.map(v=>`
    <button onclick="selecionarPlacaManutencao('${v.placa}','${v.modelo||''}')"
      style="width:100%;text-align:left;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <span style="font-family:monospace;font-weight:800;font-size:14px;color:#2E86D9">${v.placa}</span>
        <span style="color:#C8D2EC;font-size:12px;margin-left:8px">${v.modelo||''}${v.ano?' ('+v.ano+')':''}</span>
        ${v.tipo?`<span style="color:#7C8AAE;font-size:11px;margin-left:8px">${v.tipo}</span>`:''}
      </div>
      <span style="color:#7C8AAE;font-size:16px">›</span>
    </button>`).join('');
}

function selecionarPlacaManutencao(placa, modelo){
  document.getElementById('f-placa').value = placa;
  const busca = document.getElementById('m-busca-placa');
  const resultado = document.getElementById('m-placa-resultado');
  if(busca) busca.value = placa+(modelo?' — '+modelo:'');

async function addFotos(input){
  const files=Array.from(input.files||[]);
  const vagas=10-fotos.length;
  const sel=files.slice(0,vagas);
  if(files.length>vagas) setErro("f-erro",`Só foi possível adicionar ${vagas} foto(s). Limite de 10.`);
  for(const f of sel){ try{ fotos.push(await compressImage(f)); }catch{} }
  input.value="";
  renderFotoGrid();
}

function renderFotoGrid(){
  $("foto-count").textContent=fotos.length+"/10";
  $("foto-count").style.color=fotos.length>=10?"#C0392B":"#7C8AAE";
  if(fotos.length===0){ $("foto-grid-container").innerHTML=""; $("foto-btn-label").classList.remove("hidden"); return; }
  $("foto-btn-label").classList.add("hidden");
  $("foto-grid-container").innerHTML=`
    <div class="foto-grid">
      ${fotos.map((src,i)=>`
        <div class="foto-item">
          <img src="${src}" alt="foto ${i+1}"/>
          <button class="foto-del" onclick="removeFoto(${i})">×</button>
          <div class="foto-num">${i+1}</div>
        </div>`).join("")}
      ${fotos.length<10?`<label class="foto-add" for="foto-input"><span>📷</span><span>Adicionar</span></label>`:''}
    </div>`;
  $("foto-btn-label").classList.add("hidden");
}

function removeFoto(i){ fotos.splice(i,1); renderFotoGrid(); if(fotos.length<10) $("foto-btn-label").classList.remove("hidden"); }

async function addBo(input){
  const f=input.files?.[0]; if(!f) return;
  boFile={name:f.name,dataUrl:await fileToDataUrl(f)};
  $("bo-label").textContent="📄 "+f.name;
}

async function enviarSolicitacao(){
  const placa=$("f-placa")?.value?.trim().toUpperCase();
  const desc=$("f-desc")?.value?.trim();
  if(!placa){setErro("f-erro","Informe a placa.");return;}
  if(!tipoSel){setErro("f-erro","Selecione o tipo de situação.");return;}
  if(tipoSel==="sinistro"&&!boFile){setErro("f-erro","Anexe o Boletim de Ocorrência.");return;}
  $("f-btn").disabled=true; $("f-btn").innerHTML='<span class="spinner"></span> Enviando...';
  setErro("f-erro","");
  try{
    const emailsCad=await loadEmails();
    const destinatarios=emailsCad.filter(e=>e.ativo).map(e=>e.email);
    const rec=await api("POST","/api/solicitacoes",{
      motorista:session.nome, placa, tipo:tipoSel, descricao:desc,
      urgencia:urgenciaSel, km:kmAtual,
      fotos, bo:boFile, destinatarios
    });
    localStorage.setItem("fc_records",JSON.stringify([rec,...JSON.parse(localStorage.getItem("fc_records")||"[]")]));
    showSucesso(rec,destinatarios);
  }catch(e){
    setErro("f-erro","Falha ao enviar: "+e.message);
    $("f-btn").disabled=false; $("f-btn").innerHTML='✉ Enviar solicitação';
  }
}

async function cancelarSolicitacao(id){

  try{
    await api("PATCH",`/api/solicitacoes/${id}`,{status:"cancelado"});
    await showMotorista();

}

            ${saidaAtiva?'📍 Em atendimento':'✅ Disponível'}

          <div style="color:#FF9B8A;font-size:12px;font-weight:700">📍 ${saidaAtiva.local}</div>
          <div style="color:#7C8AAE;font-size:11px;margin-top:2px">Solicitante: ${saidaAtiva.solicitante}</div>

function renderListaAtendimentos(ats, sds, busca='', data=''){
  let lista = [...ats].sort((a,b)=>new Date(b.dataEntrega)-new Date(a.dataEntrega));
  if(busca) lista = lista.filter(a=>
    a.motorista?.toLowerCase().includes(busca.toLowerCase()) ||
    a.veiculo?.toLowerCase().includes(busca.toLowerCase())
  );
  if(data) lista = lista.filter(a=>a.dataEntrega?.slice(0,10)===data);
  if(!lista.length) return '<p style="color:#5C6889;font-size:13px">Nenhum registro encontrado.</p>';
  return lista.map(a=>{
    const kmRodado=a.kmFinal&&a.kmInicial?(parseFloat(a.kmFinal)-parseFloat(a.kmInicial)):null;
    const duracao=a.dataDevolucao?dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)):null;
    const nSaidas=sds.filter(s=>s.atendimentoId===a.id).length;
    const saidaAtiva=sds.find(s=>s.atendimentoId===a.id&&!s.retorno);
    return `<div class="card" style="cursor:pointer;margin-bottom:8px;border-left:3px solid ${a.dataDevolucao?'#2E7D32':saidaAtiva?'#C0392B':'#1F5C8C'}" onclick="showDetalheAtendimento('${a.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="min-width:0;flex:1">
          <div style="font-weight:700;font-size:14px">👤 ${a.motorista}</div>
          <div style="color:#7C8AAE;font-size:12px;margin-top:2px">🚗 ${a.veiculo} · ${new Date(a.dataEntrega).toLocaleDateString('pt-BR')} · ${nSaidas} saída(s)</div>
          ${saidaAtiva?`<div style="color:#FF9B8A;font-size:11px;font-weight:700;margin-top:2px">📍 Em atendimento: ${saidaAtiva.local}</div>`:''}
          ${kmRodado!==null?`<div style="color:#2E86D9;font-size:11px;font-weight:700;margin-top:2px">📏 ${Number(kmRodado).toLocaleString('pt-BR')} km · ⏱ ${duracao}</div>`:''}
          ${sds.filter(s=>s.atendimentoId===a.id).length>0?`
          <div style="margin-top:6px;padding-top:6px;border-top:1px solid #2C3550">
            ${sds.filter(s=>s.atendimentoId===a.id).map(s=>`
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${s.retorno?'#2E7D32':'#C0392B'}"></span>
                <span style="color:#C8D2EC;font-size:11px">📍 ${s.local}</span>
                <span style="color:#5C6889;font-size:10px;margin-left:auto">${s.retorno?dur(new Date(s.retorno)-new Date(s.saida)):'Em atendimento'}</span>
              </div>`).join('')}
          </div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="badge" style="background:${a.dataDevolucao?'#2E7D3222':saidaAtiva?'#C0392B22':'#1F5C8C22'};color:${a.dataDevolucao?'#81C784':saidaAtiva?'#FF9B8A':'#2E86D9'};border:1px solid ${a.dataDevolucao?'#2E7D3255':saidaAtiva?'#C0392B55':'#1F5C8C55'}">
            ${a.dataDevolucao?'✅ Devolvido':saidaAtiva?'📍 Em atendimento':'🔑 Disponível'}
          </span>
          ${a.dataDevolucao?`<button onclick="event.stopPropagation();gerarPDFAtendimento('${a.id}')" style="padding:3px 8px;border-radius:6px;border:1px solid #2E86D9;background:#2E86D922;color:#2E86D9;cursor:pointer;font-size:10px;font-weight:700">📄 PDF</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

}

function selecionarTipoRelatorio(tipo){
  window._rpTipo = tipo;
  $("rp-tipo-motorista").style.background = tipo==='motorista'?'#2E86D922':'transparent';
  $("rp-tipo-motorista").style.borderColor = tipo==='motorista'?'#2E86D9':'#2C3550';
  $("rp-tipo-motorista").style.color = tipo==='motorista'?'#2E86D9':'#7C8AAE';
  $("rp-tipo-veiculo").style.background = tipo==='veiculo'?'#2E86D922':'transparent';
  $("rp-tipo-veiculo").style.borderColor = tipo==='veiculo'?'#2E86D9':'#2C3550';
  $("rp-tipo-veiculo").style.color = tipo==='veiculo'?'#2E86D9':'#7C8AAE';

  const opts = tipo==='motorista' ? window._rpMotoristas : window._rpVeiculos;
  $("rp-select-container").innerHTML = `
    <label class="field-label">${tipo==='motorista'?'Motorista':'Veículo'} *</label>
    <select id="rp-valor" class="field-select" style="width:100%;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:10px;color:#fff;font-size:14px;outline:none">
      <option value="">Selecione...</option>
      ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
    </select>`;
}

function gerarRelatorioPDF(){
  const tipo = window._rpTipo;
  const valor = $("rp-valor")?.value;
  const dataIni = $("rp-data-ini")?.value;
  const dataFim = $("rp-data-fim")?.value;

  if(!valor){ setErro("rp-erro", `Selecione um ${tipo==='motorista'?'motorista':'veículo'}.`); return; }
  if(!dataIni||!dataFim){ setErro("rp-erro","Selecione o período."); return; }

  const inicio = new Date(dataIni).getTime();
  const fim = new Date(dataFim).getTime()+86399999;

  let atsFiltrados = atendimentos.filter(a=>{
    const dt = new Date(a.dataEntrega).getTime();
    const matchValor = tipo==='motorista' ? a.motorista===valor : a.veiculo===valor;
    return matchValor && dt>=inicio && dt<=fim;
  });

  if(!atsFiltrados.length){ setErro("rp-erro","Nenhum registro encontrado para esse período."); return; }

  // Montar linhas combinando atendimento + suas saídas
  let totalKm = 0, totalSaidas = 0;
  const blocos = atsFiltrados.map(a=>{
    const saidasAt = saidas.filter(s=>s.atendimentoId===a.id);
    totalSaidas += saidasAt.length;
    const kmRodado = a.kmFinal&&a.kmInicial?(parseFloat(a.kmFinal)-parseFloat(a.kmInicial)):0;
    totalKm += kmRodado;
    const duracao = a.dataDevolucao?dur(new Date(a.dataDevolucao)-new Date(a.dataEntrega)):'Em uso';
    const saidasRows = saidasAt.map((s,i)=>`
      <tr style="background:${i%2?'#f5f7ff':'#fff'}">
        <td>${s.local}</td><td>${s.solicitante}</td><td>${s.motivo||'—'}</td>
        <td>${new Date(s.saida).toLocaleString('pt-BR')}</td>
        <td>${s.retorno?new Date(s.retorno).toLocaleString('pt-BR'):'Em atendimento'}</td>
        <td>${s.retorno?dur(new Date(s.retorno)-new Date(s.saida)):'—'}</td>
      </tr>`).join('');
    return `
    <div style="margin-bottom:18px;border:1px solid #e0e4f0;border-radius:8px;padding:12px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:2px solid #2E86D9;padding-bottom:6px">
        <div><strong style="font-size:13px">${tipo==='motorista'?a.veiculo:a.motorista}</strong> <span style="color:#7C8AAE;font-size:11px">— ${tipo==='motorista'?'Veículo':'Motorista'}</span></div>
        <span style="font-size:10px;font-weight:700;color:${a.dataDevolucao?'#2E7D32':'#854F0B'}">${a.dataDevolucao?'✅ Devolvido':'🔑 Em uso'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;font-size:10px">
        <div><span style="color:#7C8AAE">Entrega:</span> ${new Date(a.dataEntrega).toLocaleString('pt-BR')}</div>
        <div><span style="color:#7C8AAE">KM Inicial:</span> ${a.kmInicial?Number(a.kmInicial).toLocaleString('pt-BR'):'—'}</div>
        <div><span style="color:#7C8AAE">Devolução:</span> ${a.dataDevolucao?new Date(a.dataDevolucao).toLocaleString('pt-BR'):'—'}</div>
        <div><span style="color:#7C8AAE">KM Final:</span> ${a.kmFinal?Number(a.kmFinal).toLocaleString('pt-BR'):'—'}</div>
      </div>
      ${kmRodado>0?`<div style="font-size:11px;font-weight:700;color:#854F0B;margin-bottom:8px">📏 ${kmRodado.toLocaleString('pt-BR')} km rodados · ⏱ ${duracao}</div>`:''}
      ${saidasAt.length>0?`<table style="width:100%;border-collapse:collapse;font-size:10px">
        <thead><tr><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Local</th><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Solicitante</th><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Motivo</th><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Saída</th><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Retorno</th><th style="background:#2E86D9;color:#1C2333;padding:4px 6px;text-align:left;font-size:9px">Duração</th></tr></thead>
        <tbody>${saidasRows}</tbody>
      </table>`:'<p style="color:#7C8AAE;font-size:10px">Sem saídas registradas.</p>'}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
  <title>Relatório — ${valor}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;font-size:11px;padding:18px}
  .header{border-bottom:3px solid #2E86D9;padding-bottom:10px;margin-bottom:14px}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .kpi-box{background:#FFF3CD;border:1px solid #2E86D955;border-radius:6px;padding:10px;text-align:center}
  .kpi-box .v{font-size:18px;font-weight:800;color:#854F0B}
  .kpi-box .l{font-size:9px;color:#7C8AAE;margin-top:2px}
  td{padding:4px 6px;border-bottom:1px solid #e0e4f0}
  .footer{margin-top:14px;font-size:9px;color:#aaa;text-align:right}
  @media print{body{padding:10px}@page{margin:8mm;size:A4}}</style>
  </head><body>
  <div class="header">
    <div style="font-size:16px;font-weight:800">🚛 Frota Conecta</div>
    <div style="font-size:12px;color:#7C8AAE;margin-top:2px">Relatório de Atendimentos — ${tipo==='motorista'?'Motorista':'Veículo'}: <strong style="color:#1a1a2e">${valor}</strong></div>
    <div style="font-size:10px;color:#7C8AAE;margin-top:4px">Período: ${new Date(dataIni).toLocaleDateString('pt-BR')} a ${new Date(dataFim).toLocaleDateString('pt-BR')}</div>
  </div>
  <div class="kpi-row">
    <div class="kpi-box"><div class="v">${atsFiltrados.length}</div><div class="l">Registros de veículo</div></div>
    <div class="kpi-box"><div class="v">${totalSaidas}</div><div class="l">Total de saídas</div></div>
    <div class="kpi-box"><div class="v">${totalKm.toLocaleString('pt-BR')} km</div><div class="l">KM total rodado</div></div>
  </div>
  ${blocos}
  <div class="footer">Frota Conecta · Gerado em ${fmt(Date.now())}</div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a2=document.createElement("a"); a2.href=url; a2.target="_blank"; a2.rel="noopener";
  document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
}

async function registrarSaida(atendimentoId, motorista, veiculo){
  const local=$("sa-local")?.value?.trim();
  const solicitante=$("sa-solicitante")?.value?.trim();
  const motivo=$("sa-motivo")?.value?.trim();
  if(!local||!solicitante||!motivo){setErro("sa-erro","Preencha todos os campos.");return;}
  $("sa-btn").disabled=true; $("sa-btn").innerHTML='<span class="spinner"></span> Registrando...';
  const saida={
    id:uid(), atendimentoId, motorista, veiculo,
    local, solicitante, motivo,
    saida: new Date().toISOString(),
    retorno: null, criadoEm: Date.now(),
    criadoPor: session.nome
  };
  try{
    await saveSaida(saida);
    showAtendimento();
  }catch(e){ setErro("sa-erro","Erro: "+e.message); $("sa-btn").disabled=false; $("sa-btn").innerHTML='🚀 Confirmar saída'; }
}

async function confirmarRetornoAtend(saidaId){
  const obs=$("ret-obs")?.value?.trim();
  $("ret-btn").disabled=true; $("ret-btn").innerHTML='<span class="spinner"></span>';

async function buscarVeiculo(termo){
  const div = document.getElementById('v-resultado');
  if(!div) return;
  if(!termo?.trim()){ div.innerHTML=''; return; }

  const [veiculos, ats, checklists, cautelas] = await Promise.all([
    loadVeiculos(), loadAtendimentos(), loadChecklistsEnviados(), loadCautelas().catch(()=>[])
  ]);
  const atEmUso = ats.filter(a=>!a.dataDevolucao);
  const clSaidasAbertas = checklists.filter(c=>
    c.tipo==='viagem-saida' && c.viagemId &&
    !checklists.some(r=>r.tipo==='viagem-retorno' && r.viagemId===c.viagemId)
  );
  const placasAtendimento = atEmUso.map(a=>a.veiculo?.toUpperCase());
  const placasChecklist = clSaidasAbertas.map(c=>c.placa?.toUpperCase());
  const cautelasAbertasBusca = cautelas.filter(c=>c.tipo==='entrega' && !cautelas.some(x=>x.origemId===c.id));
  const placasCautelaBusca = cautelasAbertasBusca.map(c=>c.veiculo?.placa?.toUpperCase());

  const t = termo.trim().toLowerCase();
  const encontrados = veiculos.filter(v=>
    v.placa?.toLowerCase().includes(t) ||
    v.modelo?.toLowerCase().includes(t) ||
    v.motorista?.toLowerCase().includes(t) ||
    v.responsavel?.toLowerCase().includes(t) ||
    v.tipo?.toLowerCase().includes(t) ||
    v.localizacao?.toLowerCase().includes(t)
  );

  if(!encontrados.length){
    div.innerHTML='<p style="color:#5C6889;font-size:13px;text-align:center;padding:12px">Nenhum veículo encontrado.</p>';
    return;
  }

  div.innerHTML = encontrados.map(v=>{
    const placa = v.placa?.toUpperCase();
    const emUsoAt = placasAtendimento.includes(placa);
    const emUsoCl = placasChecklist.includes(placa);
    const emUsoCt = placasCautelaBusca.includes(placa);
    const emUso = emUsoAt || emUsoCl || emUsoCt;
    const atAtivo = atEmUso.find(a=>a.veiculo?.toUpperCase()===placa);
    const clAtivo = clSaidasAbertas.find(c=>c.placa?.toUpperCase()===placa);
    const ctAtivo = cautelasAbertasBusca.find(c=>c.veiculo?.placa?.toUpperCase()===placa);
    return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${emUso?'#1F5C8C':'#2E7D32'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="min-width:0;flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;font-family:monospace;color:#fff">${v.placa}</span>
            <span style="color:#C8D2EC;font-size:13px">${v.modelo}${v.ano?' ('+v.ano+')':''}</span>
          </div>
          <div style="color:#7C8AAE;font-size:12px;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px">
            ${v.tipo?`<span>🚗 ${v.tipo}</span>`:''}
            ${v.localizacao?`<span>📍 ${v.localizacao}</span>`:''}
            ${v.responsavel?`<span>👤 ${v.responsavel}</span>`:''}

async function salvarVeiculo(id){
  const placa = document.getElementById('v-placa')?.value?.trim().toUpperCase();
  const modelo = document.getElementById('v-modelo')?.value?.trim();
  if(!placa||!modelo){ setErro("v-erro","Preencha placa e marca/modelo."); return; }

  const respCpf = document.getElementById('v-resp-cpf')?.value?.trim()||'';
  if(respCpf && !validarCPF(respCpf)){ setErro("v-erro","CPF do responsável inválido. Confira os números digitados."); return; }

  try{
    const todosVeiculos = await loadVeiculos();
    const duplicado = todosVeiculos.find(v=>v.placa?.toUpperCase()===placa && v.id!==id);
    if(duplicado){ setErro("v-erro",`Já existe um veículo cadastrado com a placa ${placa} (${duplicado.modelo||'—'}).`); return; }
  }catch(e){ setErro("v-erro","Erro ao verificar placa: "+e.message); return; }

  document.getElementById('v-btn').disabled=true;
  document.getElementById('v-btn').innerHTML='<span class="spinner"></span>';
  const dados = {
    placa, modelo,
    ano: document.getElementById('v-ano')?.value?.trim()||'',
    chassi: document.getElementById('v-chassi')?.value?.trim().toUpperCase()||'',
    renavam: document.getElementById('v-renavam')?.value?.trim()||'',
    cor: document.getElementById('v-cor')?.value?.trim()||'',
    contratoLocacao: document.getElementById('v-contrato')?.value?.trim()||'',
    tipo: document.getElementById('v-tipo')?.value||'',
    localizacao: document.getElementById('v-loc')?.value?.trim()||'',
    responsavel: document.getElementById('v-resp')?.value?.trim()||'',
    responsavelCargo: document.getElementById('v-resp-cargo')?.value?.trim()||'',
    responsavelCpf: respCpf,
    responsavelTelefone: document.getElementById('v-resp-tel')?.value?.trim()||'',
    motorista: document.getElementById('v-mot')?.value?.trim()||''
  };
  try{
    if(id){ await updateVeiculo(id, dados); }
    else { await saveVeiculo({id:uid(), ...dados, criadoEm:Date.now()}); }
    showGestor('veiculos');
  }catch(e){
    setErro("v-erro","Erro: "+e.message);
    document.getElementById('v-btn').disabled=false;
    document.getElementById('v-btn').innerHTML=id?'💾 Salvar alterações':'🚐 Cadastrar veículo';
  }
}

async function gerarPDFFrota(tipoFiltro){
  const [todosVeiculos, ats, checklists, cautelas] = await Promise.all([
    loadVeiculos(), loadAtendimentos(), loadChecklistsEnviados(), loadCautelas().catch(()=>[])
  ]);
  const veiculos = tipoFiltro ? todosVeiculos.filter(v=>v.tipo===tipoFiltro) : todosVeiculos;
  const atEmUso = ats.filter(a=>!a.dataDevolucao);
  const clSaidasAbertas = checklists.filter(c=>
    c.tipo==='viagem-saida' && c.viagemId &&
    !checklists.some(r=>r.tipo==='viagem-retorno' && r.viagemId===c.viagemId)
  );
  const placasAt = atEmUso.map(a=>a.veiculo?.toUpperCase());
  const placasCl = clSaidasAbertas.map(c=>c.placa?.toUpperCase());
  const cautelasAbertasPdf = cautelas.filter(c=>c.tipo==='entrega' && !cautelas.some(x=>x.origemId===c.id));
  const placasCtPdf = cautelasAbertasPdf.map(c=>c.veiculo?.placa?.toUpperCase());

  const linhas = veiculos.map((v,i)=>{
    const placa = v.placa?.toUpperCase();
    const emUsoAt = placasAt.includes(placa);
    const emUsoCl = placasCl.includes(placa);
    const emUsoCt = placasCtPdf.includes(placa);
    const atAtivo = atEmUso.find(a=>a.veiculo?.toUpperCase()===placa);
    const clAtivo = clSaidasAbertas.find(c=>c.placa?.toUpperCase()===placa);
    const ctAtivo = cautelasAbertasPdf.find(c=>c.veiculo?.placa?.toUpperCase()===placa);
    let status = '✅ Disponível';
    let info = '—';
    if(emUsoAt){ status='🔑 Atendimento'; info=`${atAtivo?.motorista||'—'} (desde ${atAtivo?new Date(atAtivo.dataEntrega).toLocaleString('pt-BR'):'—'})`; }
    else if(emUsoCl){ status='🗺 Em viagem'; info=`${clAtivo?.condutor||clAtivo?.motorista||'—'} → ${clAtivo?.destino||'—'}`; }
    else if(emUsoCt){ status='🔏 Em cautela'; info=`${ctAtivo?.responsavel?.nome||'—'} (Nº ${ctAtivo?.numero||'—'})`; }
    return `<tr style="background:${i%2?'#f5f7ff':'#fff'}">
      <td style="font-family:monospace;font-weight:700">${v.placa}</td>
      <td>${v.modelo||'—'}</td>
      <td>${v.ano||'—'}</td>
      <td style="font-size:9px">${v.chassi||'—'}</td>
      <td>${v.renavam||'—'}</td>
      <td>${v.cor||'—'}</td>
      <td>${v.tipo||'—'}</td>
      <td>${v.localizacao||'—'}</td>
      <td>${v.responsavel||'—'}</td>
      <td>${v.responsavelTelefone||'—'}</td>
      <td style="font-weight:700;color:${emUsoAt?'#D97706':emUsoCl?'#3B82F6':'#16A34A'}">${status}</td>
      <td style="font-size:10px">${info}</td>

async function excluirVeiculo(id, placa){
  try{
    const [ats, cautelas] = await Promise.all([loadAtendimentos().catch(()=>[]), loadCautelas().catch(()=>[])]);
    const p = placa?.toUpperCase();
    const atAtivo = ats.find(a=>!a.dataDevolucao && a.veiculo?.toUpperCase()===p);
    if(atAtivo){
      alert(`Não é possível excluir: este veículo está em atendimento com ${atAtivo.motorista} desde ${new Date(atAtivo.dataEntrega).toLocaleString('pt-BR')}. Registre a devolução antes de excluir.`);
      return;
    }
    const cautelaAtiva = cautelas.find(c=>c.tipo==='entrega' && c.veiculo?.placa?.toUpperCase()===p && !cautelas.some(x=>x.origemId===c.id));
    if(cautelaAtiva){
      alert(`Não é possível excluir: este veículo tem uma cautela em aberto (Nº ${cautelaAtiva.numero||'—'}, com ${cautelaAtiva.responsavel?.nome||'—'}). Registre a devolução antes de excluir.`);
      return;
    }
  }catch(e){ alert("Erro ao verificar uso do veículo: "+e.message); return; }

  if(!confirm(`Excluir o veículo ${placa}?`)) return;
  try{ await deleteVeiculo(id); showGestor('veiculos'); }
  catch(e){ alert("Erro: "+e.message); }
}

function calcKpis(recs){
  const resp=recs.filter(r=>r.respondidoEm);
  return {
    total:recs.length,
    tempoResp:resp.length?resp.reduce((a,r)=>a+(r.respondidoEm-r.enviadoEm),0)/resp.length:null,
    subs:recs.filter(r=>r.veiculoSubstituido===true).length,
    sinistros:recs.filter(r=>r.tipo==="sinistro").length
  };
}

let filtroAtual="todos";
function filtrar(f){
  filtroAtual=f;
  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.toggle("active",b.dataset.filtro===f));
  aplicarFiltros();
}
function aplicarFiltros(){
  const motorista=$("filtro-motorista")?.value||"";
  const urgencia=$("filtro-urgencia")?.value||"";
  const dataIni=$("filtro-data-ini")?.value?new Date($("filtro-data-ini").value).getTime():null;
  const dataFim=$("filtro-data-fim")?.value?new Date($("filtro-data-fim").value).getTime()+86399999:null;
  let fil=records;
  if(filtroAtual!=="todos") fil=fil.filter(r=>r.status===filtroAtual);
  if(motorista) fil=fil.filter(r=>r.motorista===motorista);
  if(urgencia) fil=fil.filter(r=>r.urgencia===urgencia);
  if(dataIni) fil=fil.filter(r=>r.criadoEm>=dataIni);
  if(dataFim) fil=fil.filter(r=>r.criadoEm<=dataFim);
  if($("lista-recs")) $("lista-recs").innerHTML=renderRecordsFiltered(fil);
}

function renderRecords(recs,f){
  const fil=f==="todos"?recs:f==="sinistro"?recs.filter(r=>r.tipo==="sinistro"):recs.filter(r=>r.status===f);
  return renderRecordsFiltered(fil);
}
function ordenarSolicitacoes(lista){
  const pesoUrgencia = {critico:0, urgente:1, normal:2};
  return [...lista].sort((a,b)=>{
    const aAberta = a.status==='enviado'||a.status==='andamento';
    const bAberta = b.status==='enviado'||b.status==='andamento';
    const prioA = aAberta ? (pesoUrgencia[a.urgencia]??2) : 3;
    const prioB = bAberta ? (pesoUrgencia[b.urgencia]??2) : 3;
    if(prioA!==prioB) return prioA-prioB;
    return (b.criadoEm||0)-(a.criadoEm||0);
  });
}

function renderRecordsFiltered(fil){
  if(!fil.length) return '<p style="color:#5C6889;font-size:13px;text-align:center;padding:32px 0">Nenhuma solicitação encontrada.</p>';
  const ordenado = ordenarSolicitacoes(fil);
  return ordenado.map(r=>{
    const urg=URGENCIA.find(u=>u.id===r.urgencia);
    return `<button class="sol-item" onclick="showDetalhe('${r.id}')">

    </button>`;
  }).join("");
}

async function updateStatus(id,status){
  try{
    const rec=await api("PATCH",`/api/solicitacoes/${id}`,{status});
    const idx=records.findIndex(r=>r.id===id);
    if(idx>=0) records[idx]=rec;
    showDetalhe(id);
  }catch(e){ alert("Erro: "+e.message); }
}

async function updateSub(id,v){
  try{
    const rec=await api("PATCH",`/api/solicitacoes/${id}`,{veiculoSubstituido:v,placaSubstituta:v?records.find(r=>r.id===id)?.placaSubstituta:null});

          ${badge(r.status)}

}

function aplicarFiltrosSinistros(){
  const mot = document.getElementById('sin-filtro-mot')?.value||'';
  const dataIni = document.getElementById('sin-filtro-ini')?.value?new Date(document.getElementById('sin-filtro-ini').value).getTime():null;
  const dataFim = document.getElementById('sin-filtro-fim')?.value?new Date(document.getElementById('sin-filtro-fim').value).getTime()+86399999:null;
  let sins = records.filter(r=>r.tipo==='sinistro');
  if(mot) sins = sins.filter(r=>r.motorista===mot);
  if(dataIni) sins = sins.filter(r=>r.criadoEm>=dataIni);
  if(dataFim) sins = sins.filter(r=>r.criadoEm<=dataFim);
  const div = document.getElementById('sin-lista');
  if(div) div.innerHTML = renderListaSinistros(sins);
}

async function salvarResetPin(id, nome, role){
  const pin = $("reset-pin")?.value?.trim();
  const pin2 = $("reset-pin2")?.value?.trim();
  if(!pin||pin.length<4){ setErro("reset-erro","Digite um PIN de 4 dígitos."); return; }
  if(pin!==pin2){ setErro("reset-erro","Os PINs não coincidem."); return; }
  $("reset-btn").disabled=true;
  $("reset-btn").innerHTML='<span class="spinner"></span> Salvando...';
  try{
    await api("PATCH",`/api/usuarios/${id}`,{pin});
    render(`
      <button class="volta-btn" onclick="showGestor('motoristas')">← Voltar</button>
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">✅</div>
        <h3 style="font-weight:800;font-size:18px;margin-bottom:8px">PIN atualizado!</h3>
        <p style="color:#7C8AAE;font-size:14px">O PIN de <strong style="color:#fff">${nome}</strong> foi alterado com sucesso.</p>
        <p style="color:#2E86D9;font-size:13px;margin-top:8px;font-weight:700">Comunique o novo PIN: ${pin}</p>
        <button class="btn btn-primary" style="margin-top:24px" onclick="showGestor('motoristas')">Voltar para Motoristas</button>
      </div>
    `);
  }catch(e){
    setErro("reset-erro","Erro: "+e.message);
    $("reset-btn").disabled=false;
    $("reset-btn").innerHTML='🔑 Salvar novo PIN';
  }
}

window._cautelaRespSel = null;

let cautelaFiltroTipo = 'todos'; // 'todos' | 'entrega' | 'devolucao' | 'aberto'

async function renderCautelas(busca='', manterFiltroTipo){
  if(!manterFiltroTipo) cautelaFiltroTipo = 'todos';
  const [cautelas, veiculos] = await Promise.all([loadCautelas().catch(()=>[]), loadVeiculos()]);
  window._cautelasCache = cautelas;

  // Entregue = cautelas de entrega AINDA NÃO devolvidas (não conta as já devolvidas)
  const cautelasEntregues = cautelas.filter(c=>c.tipo==='entrega' && !cautelas.some(x=>x.origemId===c.id));
  // Devolução = todas as devoluções já feitas (mantido)
  const cautelasDevolvidas = cautelas.filter(c=>c.tipo==='devolucao');
  // Em aberto = VEÍCULOS sem cautela nenhuma ainda, ou já devolvidos (livres pra cautelar)
  const placasComCautelaAberta = new Set(cautelasEntregues.map(c=>c.veiculo?.placa));
  const veiculosEmAberto = veiculos.filter(v=>!placasComCautelaAberta.has(v.placa));

  const t = busca.trim().toLowerCase();

  // Monta a lista de acordo com o ícone selecionado
  let listaCautelas = [];
  let listaVeiculos = [];
  if(cautelaFiltroTipo==='entrega') listaCautelas = cautelasEntregues;
  else if(cautelaFiltroTipo==='devolucao') listaCautelas = cautelasDevolvidas;
  else if(cautelaFiltroTipo==='aberto') listaVeiculos = veiculosEmAberto;
  else listaCautelas = cautelas; // 'todos'

  if(t){
    listaCautelas = listaCautelas.filter(c=>
      c.numero?.toLowerCase().includes(t) ||
      c.veiculo?.placa?.toLowerCase().includes(t) ||
      c.responsavel?.nome?.toLowerCase().includes(t)
    );
    listaVeiculos = listaVeiculos.filter(v=>
      v.placa?.toLowerCase().includes(t) || v.modelo?.toLowerCase().includes(t)
    );
  }
  listaCautelas.sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));

  const conteudoLista = cautelaFiltroTipo==='aberto'
    ? (listaVeiculos.length ? `
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${listaVeiculos.map(v=>`
            <button onclick="abrirNovaCautela('entrega','${v.placa}')"
              style="background:#10141F;border:1px solid #1F5C8C55;border-radius:999px;padding:8px 14px;cursor:pointer;font-family:monospace;font-weight:700;font-size:13px;color:#2E86D9">
              ${v.placa} <span style="font-family:inherit;font-weight:400;color:#7C8AAE;font-size:11px">· ${v.modelo||''}</span>
            </button>`).join('')}
        </div>
        <p style="font-size:11px;color:#5C6889;margin-top:10px">Toque numa placa pra já iniciar a cautela de entrega desse veículo.</p>`
      : '<p style="color:#5C6889;font-size:13px;text-align:center;padding:20px">Nenhum veículo livre pra cautelar no momento.</p>')
    : (listaCautelas.length
      ? listaCautelas.map(c=>renderCardCautela(c)).join('')
      : '<p style="color:#5C6889;font-size:13px;text-align:center;padding:20px">Nenhuma cautela encontrada para esse filtro.</p>');

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <button id="ct-icone-entrega" onclick="filtrarPorTipoCautela('entrega')"
        style="background:#2E7D32${cautelaFiltroTipo==='entrega'?'33':'22'};border:1px solid #2E7D32${cautelaFiltroTipo==='entrega'?'':'55'};border-radius:10px;padding:14px 6px;cursor:pointer;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">🔑</div>
        <div style="color:#81C784;font-size:22px;font-weight:800">${cautelasEntregues.length}</div>
        <div style="color:#81C784;font-size:10px;font-weight:700;line-height:1.3;margin-top:2px">Entregue</div>
      </button>
      <button id="ct-icone-devolucao" onclick="filtrarPorTipoCautela('devolucao')"
        style="background:#3D5A80${cautelaFiltroTipo==='devolucao'?'33':'22'};border:1px solid #3D5A80${cautelaFiltroTipo==='devolucao'?'':'55'};border-radius:10px;padding:14px 6px;cursor:pointer;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">↩</div>
        <div style="color:#8FB4E3;font-size:22px;font-weight:800">${cautelasDevolvidas.length}</div>
        <div style="color:#8FB4E3;font-size:10px;font-weight:700;line-height:1.3;margin-top:2px">Devolução</div>
      </button>
      <button id="ct-icone-aberto" onclick="filtrarPorTipoCautela('aberto')"
        style="background:#1F5C8C${cautelaFiltroTipo==='aberto'?'33':'22'};border:1px solid #1F5C8C${cautelaFiltroTipo==='aberto'?'':'55'};border-radius:10px;padding:14px 6px;cursor:pointer;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">🔓</div>
        <div style="color:#2E86D9;font-size:22px;font-weight:800">${veiculosEmAberto.length}</div>
        <div style="color:#2E86D9;font-size:10px;font-weight:700;line-height:1.3;margin-top:2px">Em aberto</div>
      </button>
    </div>
    <button class="btn btn-primary" style="margin-bottom:14px;width:100%" onclick="abrirNovaCautela('entrega')">🔑 Nova Cautela — Entrega</button>
    <div style="text-align:right;margin-bottom:10px">
      <button class="btn-sair" onclick="renderConfigCautelaGo()">⚙ Configurar assinantes padrão</button>
    </div>
    <input id="ct-busca" placeholder="${cautelaFiltroTipo==='aberto'?'🔍 Buscar por placa ou modelo...':'🔍 Buscar por nº do termo, placa ou responsável...'}"
      style="width:100%;background:#1C2333;border:1px solid #2C3550;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:12px"
      oninput="clearTimeout(window._ctTimer);window._ctTimer=setTimeout(()=>atualizarListaCautelas(this.value),300)" value="${busca}"/>
    ${cautelaFiltroTipo!=='todos'?`<div style="margin-bottom:10px"><button onclick="filtrarPorTipoCautela('${cautelaFiltroTipo}')" style="background:transparent;border:none;color:#8FB4E3;cursor:pointer;font-size:12px;text-decoration:underline">✕ Limpar filtro (${cautelaFiltroTipo==='entrega'?'Entregue':cautelaFiltroTipo==='devolucao'?'Devolução':'Em aberto'})</button></div>`:''}
    <div id="ct-lista">
      ${conteudoLista}
    </div>
  `;
}

function filtrarPorTipoCautela(tipo){
  cautelaFiltroTipo = (cautelaFiltroTipo===tipo) ? 'todos' : tipo;
  const div = document.getElementById('aba-conteudo');
  if(div){
    renderCautelas('', true).then(html=>{ div.innerHTML = html; });
  }
}

async function atualizarListaCautelas(busca){
  const div = document.getElementById('ct-lista');
  if(!div) return;
  const html = await renderCautelas(busca, true);
  // extrai só a lista, evitando re-renderizar cabeçalho inteiro
  const tmp = document.createElement('div'); tmp.innerHTML = html;
  const novaLista = tmp.querySelector('#ct-lista');
  if(novaLista) div.innerHTML = novaLista.innerHTML;
}

function renderCardCautela(c){
  const isEntrega = c.tipo==='entrega';
  const devolvida = isEntrega && (window._cautelasCache||[]).some(x=>x.origemId===c.id);
  return `<div class="card" style="margin-bottom:10px;border-left:3px solid ${isEntrega?'#2E7D32':'#3D5A80'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div style="min-width:0">
        <span style="font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;background:${isEntrega?'#2E7D3233':'#3D5A8033'};color:${isEntrega?'#81C784':'#8FB4E3'}">${isEntrega?'🔑 ENTREGA':'↩ DEVOLUÇÃO'}</span>
        ${devolvida?'<span style="font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;background:#3D5A8033;color:#8FB4E3;margin-left:6px">✅ DEVOLVIDA</span>':''}
        <div style="font-family:monospace;font-weight:800;font-size:14px;color:#fff;margin-top:4px">${c.veiculo?.placa||'—'}</div>
        <div style="color:#C8D2EC;font-size:12px">${c.veiculo?.modelo||''}</div>
      </div>
      <div style="text-align:right;font-size:11px;color:#7C8AAE">${fmt(c.criadoEm)}</div>
    </div>
    <div style="font-size:12px;color:#9DB0D6;margin-bottom:8px">👤 ${c.responsavel?.nome||'—'} · Nº ${c.numero||'—'} ${c.pdfGeradoEm?'<span style="color:#7C8AAE">· 📄 PDF gerado (registro travado)</span>':''}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="verCautela('${c.id}')">👁 Ver</button>
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="gerarPDFCautela('${c.id}')">🖨 PDF</button>
      ${!c.pdfGeradoEm?`<button class="btn btn-sm" style="flex:1;background:#3D5A8022;color:#8FB4E3;border:1px solid #3D5A8055" onclick="editarCautela('${c.id}')">✏ Editar</button>`:''}
      ${isEntrega&&!devolvida?`<button class="btn btn-sm" style="flex:1;background:#1F5C8C22;color:#2E86D9;border:1px solid #1F5C8C55" onclick="abrirDevolucaoDeCautela('${c.id}')">↩ Devolver</button>`:''}
      <button class="btn btn-sm" style="background:${c.pdfGeradoEm?'#5C688922':'#C0392B22'};color:${c.pdfGeradoEm?'#5C6889':'#E57373'};border:1px solid ${c.pdfGeradoEm?'#5C688955':'#C0392B55'}" onclick="confirmarExcluirCautela('${c.id}')" title="${c.pdfGeradoEm?'PDF já gerado — exclusão bloqueada':'Excluir'}">🗑</button>
    </div>
  </div>`;
}

function confirmarExcluirCautela(id){
  const c = (window._cautelasCache||[]).find(x=>x.id===id);
  if(c?.pdfGeradoEm){
    alert('Esta cautela já teve o PDF gerado (provavelmente já foi assinada fisicamente) e não pode mais ser excluída, para preservar a integridade do registro.');
    return;
  }
  if(!confirm('Excluir esta cautela? Esta ação não pode ser desfeita.')) return;
  deleteCautela(id).then(()=>showGestor('cautelas')).catch(e=>alert('Erro ao excluir: '+e.message));
}

  const div = document.getElementById('aba-conteudo');
  if(div) div.innerHTML = await renderConfigCautela();
}

async function salvarConfigCautelaForm(){
  const btn = document.getElementById('cfg-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const cfg = {
    secretario: {
      nome: document.getElementById('cfg-sec-nome')?.value?.trim()||'',
      rg: document.getElementById('cfg-sec-rg')?.value?.trim()||'',
      cpf: document.getElementById('cfg-sec-cpf')?.value?.trim()||''
    },
    diretor: {
      nome: document.getElementById('cfg-dir-nome')?.value?.trim()||'',
      rg: document.getElementById('cfg-dir-rg')?.value?.trim()||'',
      cpf: document.getElementById('cfg-dir-cpf')?.value?.trim()||''
    }
  };
  try{
    await saveConfigCautela(cfg);
    showGestor('cautelas');
  }catch(e){
    setErro('cfg-erro','Erro ao salvar: '+e.message);
    btn.disabled=false; btn.innerHTML='💾 Salvar padrões';
  }
}

async function proximoNumeroCautela(){
  const cautelas = window._cautelasCache?.length ? window._cautelasCache : await loadCautelas().catch(()=>[]);
  let max = 0;
  cautelas.forEach(c=>{
    const n = parseInt(c.numero, 10);
    if(!isNaN(n) && n>max) max = n;
  });
  return String(max+1).padStart(2,'0');
}

async function abrirNovaCautela(tipo, placaPreSelecionada){
  cautelaFotosTmp = [];
  window._cautelaVeiculoSel = null;
  window._cautelaRespSel = null;
  const div = document.getElementById('aba-conteudo');
  const [cfg, numero] = await Promise.all([loadConfigCautela(), proximoNumeroCautela()]);
  if(div) div.innerHTML = renderFormCautela(tipo, cfg, {numero});
  if(placaPreSelecionada){
    const veiculos = await loadVeiculos();
    const v = veiculos.find(x=>x.placa===placaPreSelecionada);
    if(v) selecionarVeiculoCautela(v);
  }
}

async function abrirDevolucaoDeCautela(id){
  cautelaFotosTmp = [];
  window._cautelaVeiculoSel = null;
  const div = document.getElementById('aba-conteudo');
  const todas = window._cautelasCache?.length ? window._cautelasCache : await loadCautelas().catch(()=>[]);
  const entrega = todas.find(x=>x.id===id);
  if(!entrega){ alert('Cautela de entrega não encontrada.'); return; }
  const [cfg, numero] = await Promise.all([loadConfigCautela(), proximoNumeroCautela()]);
  const prefill = {
    numero, origemId: entrega.id,
    veiculo: entrega.veiculo, km: entrega.km,
    responsavel: entrega.responsavel,
    secretario: entrega.secretario?.nome ? entrega.secretario : cfg.secretario,
    diretor: entrega.diretor?.nome ? entrega.diretor : cfg.diretor
  };
  if(div) div.innerHTML = renderFormCautela('devolucao', cfg, prefill);
  if(prefill.veiculo?.placa) selecionarVeiculoCautela(prefill.veiculo);
}

async function editarCautela(id){
  cautelaFotosTmp = [];
  window._cautelaVeiculoSel = null;
  const div = document.getElementById('aba-conteudo');
  const todas = window._cautelasCache?.length ? window._cautelasCache : await loadCautelas().catch(()=>[]);
  const c = todas.find(x=>x.id===id);
  if(!c){ alert('Cautela não encontrada.'); return; }
  if(c.pdfGeradoEm){ alert('Esta cautela já teve o PDF gerado e não pode mais ser editada, para preservar a integridade do registro.'); return; }
  cautelaFotosTmp = c.fotos ? [...c.fotos] : [];
  const cfg = await loadConfigCautela();
  const prefill = {
    numero: c.numero, editId: c.id, origemId: c.origemId, processoSei: c.processoSei,
    veiculo: c.veiculo, km: c.km,
    responsavel: c.responsavel,
    secretario: c.secretario, diretor: c.diretor
  };
  if(div) div.innerHTML = renderFormCautela(c.tipo, cfg, prefill);
  if(prefill.veiculo?.placa) selecionarVeiculoCautela(prefill.veiculo);
  renderFotoGridCautela();
}

async function buscarVeiculoCautela(termo){
  const div = document.getElementById('ct-veiculo-resultado');
  if(!div) return;
  if(!termo?.trim()){ div.innerHTML=''; return; }
  const veiculos = await loadVeiculos();
  window._cautelaVeiculoBusca = veiculos;
  const t = termo.trim().toLowerCase();
  const encontrados = veiculos.filter(v=>v.placa?.toLowerCase().includes(t)||v.modelo?.toLowerCase().includes(t));
  if(!encontrados.length){
    div.innerHTML = '<p style="color:#5C6889;font-size:12px;padding:6px 0">Nenhum veículo encontrado.</p>';
    return;
  }
  div.innerHTML = encontrados.map(v=>`

async function buscarResponsavelCautela(termo){
  const div = document.getElementById('ct-resp-resultado');
  if(!div) return;
  if(!termo?.trim()){ div.innerHTML=''; document.getElementById('ct-resp-nome').value=''; return; }
  let motoristas = [];
  try{
    const u = await api("GET","/api/usuarios");
    motoristas = u.filter(x=>(x.role==='motorista'||x.role==='atendimento')&&x.aprovado!==false&&x.ativo!==false);
  }catch{ motoristas=[]; }
  const t = termo.trim().toLowerCase();
  const encontrados = motoristas.filter(m=>m.nome?.toLowerCase().includes(t));
  if(!encontrados.length){
    div.innerHTML='<p style="color:#5C6889;font-size:12px;padding:6px 0">Nenhum cadastro encontrado. Você pode digitar o nome manualmente.</p>';
    document.getElementById('ct-resp-nome').value = termo.trim();
    return;
  }
  div.innerHTML = encontrados.map(m=>`
    <button onclick="selecionarResponsavelCautela('${m.nome.replace(/'/g,"\\'")}')"
      style="width:100%;text-align:left;background:#10141F;border:1px solid #2C3550;border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fff;font-size:13px;font-weight:600">👤 ${m.nome}</span>
      <span style="color:#7C8AAE;font-size:16px">›</span>
    </button>`).join('');
}

async function addFotoCautela(input){
  const files = Array.from(input.files||[]);
  const vagas = 10-cautelaFotosTmp.length;
  const sel = files.slice(0,vagas);
  if(files.length>vagas) setErro('ct-erro',`Só foi possível adicionar ${vagas} foto(s). Limite de 10.`);
  for(const f of sel){ try{ cautelaFotosTmp.push(await compressImage(f)); }catch{} }
  input.value='';
  renderFotoGridCautela();
}

function renderFotoGridCautela(){
  const count = document.getElementById('ct-foto-count');
  const btnLabel = document.getElementById('ct-foto-btn-label');
  const grid = document.getElementById('ct-foto-grid');
  if(count) count.textContent = cautelaFotosTmp.length+'/10';
  if(btnLabel) btnLabel.classList.toggle('hidden', cautelaFotosTmp.length>=10);
  if(!grid) return;
  if(!cautelaFotosTmp.length){ grid.innerHTML=''; return; }
  grid.innerHTML = `<div class="foto-grid">
    ${cautelaFotosTmp.map((src,i)=>`
      <div class="foto-item">
        <img src="${src}" alt="foto ${i+1}"/>
        <button class="foto-del" onclick="removeFotoCautela(${i})">×</button>
        <div class="foto-num">${i+1}</div>
      </div>`).join('')}
  </div>`;
}

function removeFotoCautela(i){ cautelaFotosTmp.splice(i,1); renderFotoGridCautela(); }

function validarCPF(cpf){
  if(!cpf) return false;
  const n = cpf.replace(/\D/g,'');
  if(n.length!==11 || /^(\d)\1{10}$/.test(n)) return false;
  let soma=0;
  for(let i=0;i<9;i++) soma += parseInt(n[i])*(10-i);
  let resto = (soma*10)%11; if(resto===10) resto=0;
  if(resto!==parseInt(n[9])) return false;
  soma=0;
  for(let i=0;i<10;i++) soma += parseInt(n[i])*(11-i);
  resto = (soma*10)%11; if(resto===10) resto=0;
  return resto===parseInt(n[10]);
}

async function salvarCautela(){
  const tipo = document.getElementById('ct-tipo')?.value;
  const origemId = document.getElementById('ct-origem-id')?.value||'';
  const editId = document.getElementById('ct-edit-id')?.value||'';
  const numero = document.getElementById('ct-numero')?.value?.trim();
  const processo = document.getElementById('ct-processo')?.value?.trim();
  const setor = 'Setor';
  const km = document.getElementById('ct-km')?.value?.trim();
  const respNome = document.getElementById('ct-resp-nome')?.value?.trim();
  const respCargo = document.getElementById('ct-resp-cargo')?.value?.trim();
  const respCpf = document.getElementById('ct-resp-cpf')?.value?.trim();
  const secNome = document.getElementById('ct-sec-nome')?.value?.trim();
  const secRg = document.getElementById('ct-sec-rg')?.value?.trim();
  const secCpf = document.getElementById('ct-sec-cpf')?.value?.trim();
  const dirNome = document.getElementById('ct-dir-nome')?.value?.trim();
  const dirRg = document.getElementById('ct-dir-rg')?.value?.trim();
  const dirCpf = document.getElementById('ct-dir-cpf')?.value?.trim();

  if(!window._cautelaVeiculoSel){ setErro('ct-erro','Selecione o veículo.'); return; }
  if(!km){ setErro('ct-erro','Informe a quilometragem.'); return; }
  if(!respNome){ setErro('ct-erro','Informe o responsável (cautelado).'); return; }
  if(respCpf && !validarCPF(respCpf)){ setErro('ct-erro','CPF do responsável inválido. Confira os números digitados.'); return; }
  if(secCpf && !validarCPF(secCpf)){ setErro('ct-erro','CPF do Secretário Geral inválido. Confira os números digitados.'); return; }
  if(dirCpf && !validarCPF(dirCpf)){ setErro('ct-erro','CPF do Diretor de Transporte inválido. Confira os números digitados.'); return; }

  const v = window._cautelaVeiculoSel;
  let todas;
  if(editId) todas = await loadCautelas().catch(()=>window._cautelasCache||[]);

  if(tipo==='entrega'){
    try{
      todas = await loadCautelas();
      const jaAberta = todas.find(c=>
        c.id!==editId && c.tipo==='entrega' && c.veiculo?.placa===v.placa &&
        !todas.some(x=>x.origemId===c.id)
      );
      if(jaAberta){
        setErro('ct-erro',`Este veículo já tem uma cautela de entrega em aberto (Nº ${jaAberta.numero||'—'}, com ${jaAberta.responsavel?.nome||'—'}). Devolva antes de criar uma nova.`);
        return;
      }
    }catch(e){ setErro('ct-erro','Erro ao verificar cautelas existentes: '+e.message); return; }
  }

  if(tipo==='devolucao' && origemId){
    try{
      todas = todas || await loadCautelas();
      const entregaOrigem = todas.find(c=>c.id===origemId);
      if(entregaOrigem?.km && Number(km) < Number(entregaOrigem.km)){
        setErro('ct-erro',`O KM da devolução (${Number(km).toLocaleString('pt-BR')}) não pode ser menor que o KM registrado na entrega (${Number(entregaOrigem.km).toLocaleString('pt-BR')}).`);
        return;
      }
    }catch(e){ /* se falhar a checagem, segue sem bloquear */ }
  }

  const btn = document.getElementById('ct-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';

  const cautelaExistente = editId ? (todas||window._cautelasCache||[]).find(c=>c.id===editId) : null;

  const dados = {
    id: editId||uid(),
    tipo, numero, processoSei: processo, setor,
    ...(origemId ? {origemId} : {}),
    veiculo: {
      placa: v.placa, modelo: v.modelo, chassi: v.chassi||'', renavam: v.renavam||'',
      cor: v.cor||'', ano: v.ano||'', contratoLocacao: v.contratoLocacao||'',
      tipoVeiculo: v.tipo||'', localizacao: v.localizacao||''
    },
    km,
    responsavel: { nome: respNome, cargo: respCargo, cpf: respCpf },
    secretario: { nome: secNome, rg: secRg, cpf: secCpf },
    diretor: { nome: dirNome, rg: dirRg, cpf: dirCpf },
    fotos: cautelaFotosTmp,
    criadoPor: cautelaExistente?.criadoPor || session?.nome||'—',
    criadoEm: cautelaExistente?.criadoEm || Date.now()
  };

  try{
    if(editId){
      await updateCautela(editId, dados);
    } else {
      await saveCautela(dados);
    }
    verCautela(dados.id, dados);
  }catch(e){
    setErro('ct-erro','Erro ao salvar: '+e.message);
    btn.disabled=false; btn.innerHTML=editId?'💾 Salvar alterações':'💾 Salvar e pré-visualizar';
  }
}

    <p class="clausula-titulo">2. CLÁUSULA SEGUNDA - DOS DEVERES E OBRIGAÇÕES DO DEPARTAMENTO DE TRANSPORTE</p>
    <p>2.1. O Departamento de Transporte, vinculado à Superintendência de Logística, exercerá a gestão e fiscalização dos veículos, conforme Art. 2º, I, da RE_651/2025, e se obriga a:</p>

    <p>2.1.4. Encaminhar, com antecedência, a comunicação sobre a necessidade de manutenção preventiva conforme o plano de revisão do fabricante ou da contratada (Art. 11, II);</p>
    <p>2.1.5. Indicar o local para resolução dos problemas dos veículos após a devida comunicação.</p>

    <p class="clausula-titulo">3. CLÁUSULA TERCEIRA - DOS DEVERES E OBRIGAÇÕES DO CAUTELADO</p>
    <p>3.1. O servidor cautelado assume a responsabilidade direta pela guarda, conservação, manutenção e adequada utilização do bem (Art. 7º, I, da RE_651/2025) e se compromete a:</p>
    <p>3.2. Uso e Condução:</p>

    <p>3.2.4. Utilizar o veículo exclusivamente para atividades institucionais, sendo vedado o transporte de pessoas estranhas ao serviço público, exceto em situações expressamente justificadas e autorizadas; (Art. 8º, III)</p>

    <p>3.3.5. Permitir a fiscalização/vistoria do veículo pelo Departamento de Transporte, a qualquer tempo (Art. 10, § 2º).</p>
    <p>3.5. Infrações e Sinistros:</p>
    <p>3.5.1. Assumir a responsabilidade pelo pagamento de multas decorrentes de infrações de trânsito e realizar a devida identificação do condutor junto aos órgãos de trânsito no prazo legal (Art. 9º e Art. 14). O não pagamento ou a não identificação poderá ensejar o bloqueio do uso do veículo e a instauração de procedimento administrativo (Art. 9º, Parágrafo Único, e Art. 14, § 2º).</p>
    <p>3.5.2. Comunicar imediatamente ao Departamento de Transporte sobre qualquer ocorrência, avaria, dano, quebra, roubo, furto ou incidente (Art. 8º, II e V).</p>
    <p>3.5.3. Em caso de acidente, roubo, furto ou sinistro, comunicar imediatamente ao Departamento de Transporte, acionar a autoridade policial para lavratura de Boletim de Ocorrência e encaminhar relatório circunstanciado da ocorrência ao Departamento de Transporte em até 48 horas (Art. 15).</p>

    <p class="clausula-titulo">4. CLÁUSULA QUARTA - DAS VEDAÇÕES (USO INDEVIDO)</p>
    <p>4.1. O servidor cautelado declara-se ciente de que o uso indevido do veículo sujeitará o responsável às penalidades cabíveis (Art. 13), sendo expressamente vedado:</p>
    <p>4.1.1. A utilização do veículo por pessoa não autorizada (Art. 13, I).</p>
    <p>4.1.2. A condução do veículo por servidor não habilitado (Art. 13, II).</p>
    <p>4.1.3. O uso do veículo para fins particulares, salvo o pernoite autorizado na residência do condutor designado, conforme previsto neste Termo (Art. 5º e Art. 13, III).</p>
    <p>4.1.4. A permanência em locais não autorizados, tais como: clubes, bares, boates, danceterias, balneários, shoppings, supermercados e afins, salvo se vinculados a missão oficial devidamente justificada (Art. 13, IV).</p>
    <p>4.1.5. O transporte de pessoas estranhas ao serviço público, exceto em situações expressamente justificadas e autorizadas (Art. 8º, III).</p>
    <p>4.1.6. A omissão na comunicação de ocorrências, infrações, avarias ou sinistros (Art. 13, VI).</p>

    <p class="clausula-titulo">5. CLÁUSULA QUINTA - DAS PENALIDADES E RESPONSABILIZAÇÃO</p>
    <p>5.1. O descumprimento das disposições deste Termo e da RE_651/2025 poderá ensejar, após processo administrativo com contraditório e ampla defesa, as seguintes penalidades (Art. 16):</p>
    <p>5.1.1. Advertência.</p>
    <p>5.1.2. Suspensão temporária do direito de uso do veículo.</p>
    <p>5.1.3. Substituição do servidor responsável pela cautela.</p>
    <p>5.1.4. Desfazimento da cautela e recolhimento imediato do veículo.</p>
    <p>5.1.5. Ressarcimento ao erário, em caso de danos materiais.</p>
    <p>5.1.6. Comunicação à Corregedoria Geral para apuração de responsabilidade administrativa, disciplinar ou de improbidade.</p>
    <p>5.2. O cautelado responderá administrativamente pelas faltas que porventura venha a praticar e sujeita-se ao ressarcimento à ALE/RO e/ou a terceiros pelos prejuízos causados pela condução negligente ou imprudente (Art. 14, § 2º).</p>

    <p class="clausula-titulo">6. CLÁUSULA SEXTA - DAS DISPOSIÇÕES FINAIS</p>
    <p>6.1. O presente Termo terá início na data de sua assinatura e vigorará até que seja realizado o distrato, ou troca do veículo.</p>
    <p>6.2. A ALE/RO poderá efetuar o distrato deste instrumento a qualquer tempo, por conveniência administrativa, com a devida notificação prévia.</p>
    <p>6.3. O veículo deverá permanecer em local apropriado nas dependências da Assembleia Legislativa, salvo quando autorizado o pernoite na residência do responsável, conforme previsto neste Termo (Art. 18).</p>
    <p>6.4. As partes elegem o Foro da Comarca de Porto Velho, Estado de Rondônia, para dirimir qualquer questão que se originar deste Termo.</p>
    <p>6.5. Para firmeza e como prova do acordado foi lavrado o presente Termo de Cautela e Responsabilidade de Utilização de Veículo, o qual depois de lido e achado conforme, segue devidamente assinado pelas partes interessadas.</p>`;
}
